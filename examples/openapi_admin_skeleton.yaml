  /admin/production/read-model/status:
    get:
      tags: [Settings]
      summary: Read production read-model smoke plan status
      operationId: getAdminProductionReadModelStatus
      description: Secret-safe operations seam for ClickHouse/tokenizer/read-model smoke preparation. The endpoint reads Postgres request-log summary plus config presence and returns a smoke_plan plus read_model_lag_explainability with backend selection, lag/staleness source, tokenizer config presence, sample query plan presence, forbidden output categories, and safe_next_action. It does not connect to ClickHouse, run load or chaos tests, close release evidence, or return DB URLs, credentials, Authorization, raw SQL, raw query text, or raw payload.
      responses:
        '200':
          description: Production read-model status and smoke plan readback.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [schema, secret_safe, status, backend, postgres, clickhouse, tokenizer_status, smoke_plan, read_model_lag_explainability, next_step]
                    properties:
                      schema:
                        const: admin_production_read_model_status.v1
                      secret_safe:
                        const: true
                      status:
                        type: string
                        enum: [ready, attention, config-needed, no-signal]
                      backend:
                        type: string
                        enum: [postgres, clickhouse, config-needed]
                      smoke_plan:
                        type: object
                        required: [schema, status, required_config_presence, sample_query_plan, readback_expectations, forbidden_outputs, next_step]
                        properties:
                          schema:
                            const: admin_production_read_model_smoke_plan.v1
                          status:
                            type: string
                            enum: [ready-for-operator-smoke, readback-ready, blocked, config-needed]
                          network_requests:
                            const: false
                          clickhouse_connected:
                            const: false
                          required_config_presence:
                            type: object
                            description: Presence-only config and secret markers; never raw values.
                          sample_query_plan:
                            type: object
                            description: Safe field-level readback plan. Raw query text and raw payload are not returned.
                          readback_expectations:
                            type: object
                            description: Postgres summary counts and explicit release_evidence_closure=false.
                          forbidden_outputs:
                            type: array
                            items:
                              type: string
                          next_step:
                            type: string
                      read_model_lag_explainability:
                        type: object
                        required: [schema, secret_safe, status, backend_selection, lag_staleness_source, tokenizer_config_presence, sample_query_plan_presence, safe_next_action, forbidden_outputs]
                        properties:
                          schema:
                            const: admin_production_read_model_lag_explainability.v1
                          secret_safe:
                            const: true
                          status:
                            type: string
                            enum: [readback-present, no-signal]
                          backend_selection:
                            type: object
                            description: Explains postgres/clickhouse selection from config presence and safe Postgres readback; no DB URLs or raw backend config are returned.
                          lag_staleness_source:
                            type: object
                            description: Explains lag/staleness from Postgres request_logs max(created_at) summary only; raw SQL, raw query, and raw payload are omitted.
                          tokenizer_config_presence:
                            type: object
                            description: Presence-only tokenizer backend/model/config-path and provider usage token column readback.
                          sample_query_plan_presence:
                            type: object
                            description: Boolean presence of postgres/clickhouse/tokenizer sample plans; raw SQL and raw query text are not returned.
                          safe_next_action:
                            type: string
                          forbidden_outputs:
                            type: array
                            items:
                              type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
