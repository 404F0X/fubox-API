          type: [string, 'null']
        bounded_grants:
          type: array
          maxItems: 20
          description: Bounded grant ids/status/amount/time only; raw source refs, voucher codes, hashes, metadata, and payloads are omitted.
          items:
            type: object
            additionalProperties: false
            required: [credit_grant_id, currency, remaining_amount, status, valid_until]
            properties:
