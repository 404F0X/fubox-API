  /admin/users/bulk-operation-plan:
    post:
      tags: [Users]
      summary: Plan bulk admin user operations
      operationId: planAdminManagedUserBulkOperation
      description: Dry-run only bulk user operation and production audit export plan. Accepts selected user ids or filter scope plus action and reason, then returns affected estimate, blocked reasons, local risk policy summary, and a safe audit export plan. Does not write user status, connect SIEM, or return password hashes, API key secrets or hashes, Authorization, provider keys, voucher raw codes, raw payloads, raw audit snapshots, idempotency keys, or full tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, reason]
              properties:
                mode:
                  type: string
                  enum: [dry_run]
                  default: dry_run
                action:
                  type: string
                  enum: [disable, restore, audit_export, review]
                reason:
                  type: string
                  minLength: 1
                  maxLength: 256
                selected_user_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                filters:
                  type: object
                  properties:
                    limit:
                      type: integer
                    project_id:
                      type: string
                      format: uuid
                    search:
                      type: string
                    status:
                      $ref: '#/components/schemas/AdminManagedUserStatus'
      responses:
        '200':
          description: Secret-safe bulk operation dry-run plan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [schema, mode, action, affected_estimate, blocked_reasons, risk_policy_summary, audit_export_plan, apply_policy, omitted_fields, secret_safe]
                    properties:
                      schema:
                        type: string
                        example: admin_managed_users_bulk_operation_plan.v1
                      mode:
                        type: string
                        example: dry_run
                      action:
                        type: string
                        example: audit_export
                      affected_estimate:
                        type: object
                        properties:
                          estimated_user_count:
                            type: integer
                          active_user_count:
                            type: integer
                          disabled_user_count:
                            type: integer
                          missing_selected_count:
                            type: integer
                          estimate_source:
                            type: string
                      blocked_reasons:
                        type: array
                        items:
                          type: object
                      rows:
                        type: array
                        items:
                          type: object
                      risk_policy_summary:
                        type: object
                        properties:
                          schema:
                            type: string
                            example: admin_users_bulk_risk_policy_summary.v1
                          external_ml_connected:
                            type: boolean
                            enum: [false]
                          external_siem_connected:
                            type: boolean
                            enum: [false]
                          automatic_enforcement:
                            type: boolean
                            enum: [false]
                          operator_confirmation_required:
                            type: boolean
                          forbidden_material_returned:
                            type: boolean
                            enum: [false]
                      audit_export_plan:
                        type: object
                        properties:
                          schema:
                            type: string
                            example: admin_users_audit_export_plan.v1
                          status:
                            type: string
                            example: plan-only
                          source:
                            type: string
                            example: audit_logs
                          external_siem_connected:
                            type: boolean
                            enum: [false]
                          raw_snapshots_returned:
                            type: boolean
                            enum: [false]
                          safe_fields:
                            type: array
                            items:
                              type: string
                          forbidden_fields:
                            type: array
                            items:
                              type: string
                      apply_policy:
                        type: object
                        properties:
                          apply_supported:
                            type: boolean
                            enum: [false]
                          safe_status_apply_path:
                            type: string
                            nullable: true
                          dangerous_cross_tenant_write_allowed:
                            type: boolean
                            enum: [false]
                      omitted_fields:
                        type: array
                        items:
                          type: string
                      secret_safe:
                        type: boolean
                        enum: [true]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
