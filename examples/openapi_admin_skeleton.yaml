      description: Secret-safe local executor seam for action=capture, refund, or chargeback_ack. It does not call merchant/provider networks and does not claim external settlement success. The endpoint gates on tenant merchant credential source and returns structured refused results for provider_disabled, credential_missing, webhook_only_credential_source, merchant_account_missing, webhook_secret_missing, unsupported provider, or config mismatch. When credential source is ready it writes a local payment_events executor marker, invokes the bounded local capture/refund/chargeback executor against existing payment_intents/payment_captures/payment_refunds/ledger/credit refs, and returns applied, replayed, or blocked with readback.
