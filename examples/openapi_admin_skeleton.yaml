    LedgerAdjustmentExecutorSummary:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - executor
        - operation
        - outcome
        - operation_key_output
        - committed
        - rolled_back
        - statement_count
        - executed_statement_count
        - refused_statement_count
        - total_rows_affected
        - final_statement_order
        - final_statement_kind
        - error_detail_output
        - row_count_mismatch
        - dedupe_material_echoed
        - omitted_material
      properties:
        schema_version:
          type: string
          enum: [billing_ledger_postgres_executor_summary.v1]
        executor:
          type: string
          enum: [control_plane_transactional_admin_ledger_adjustment_writer]
        operation:
          type: string
          description: Bounded operation label, for example adjust, refund, or execute_contract on explicit preflight refusal.
        outcome:
          type: string
          enum: [applied, idempotent, refused_preflight, refused_rollback]
        operation_key_output:
          type: string
          enum: [omitted]
        committed:
          type: boolean
          description: true for applied/idempotent execute responses, false for refusal summaries.
        rolled_back:
          type: boolean
          description: true only when a transactional refusal rolled back after a bounded writer attempt.
        statement_count:
          type: integer
          minimum: 0
        executed_statement_count:
          type: integer
          minimum: 0
        refused_statement_count:
          type: integer
          minimum: 0
        total_rows_affected:
          type: integer
          minimum: 0
        final_statement_order:
          type: [integer, 'null']
          minimum: 1
        final_statement_kind:
          type: [string, 'null']
          description: Safe statement kind marker such as insert_ledger_entry, statement_refusal, or row_count_enforcement; null when no statement was attempted.
        error_detail_output:
          type: string
          enum: [omitted]
        row_count_mismatch:
          type: boolean
        dedupe_material_echoed:
          type: boolean
          const: false
        raw_executor_error_detail_echoed:
          type: boolean
          const: false
          description: Present on refusal summaries; omitted from applied/idempotent summaries.
        omitted_material:
          type: array
          items:
            type: string
          description: Bounded omission classes only; no raw operation key, dedupe material, raw metadata, credentials, Authorization/Cookie headers, payload/body, or executor error detail.
