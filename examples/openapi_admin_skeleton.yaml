      operationId: listVirtualKeyLeakCandidates
      description: >
        Read-only leak candidate handoff plus external scanner adapter config/readback.
        Returns key id, non-secret prefix, status, reason, source, first_seen, last_seen,
        confidence, action_recommendation, and presence-only scanner adapter fields:
        provider, status, endpoint_ref_present, secret_ref_present, webhook_ref_present,
        sync_direction, last_scan_marker, readiness, and blocked_reason. It does not
        connect to a real scanner or run a repo scan. It never returns virtual key
        secrets, secret hashes, raw tokens, Authorization headers, raw leak payloads,
        raw findings, scanner secrets, endpoint URLs, webhook secrets, or request bodies.
        Disable/revoke remains a separate operator-confirmed action.
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/VirtualKeyStatus'
      responses:
        '200':
          description: Secret-safe leak candidate readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualKeyLeakCandidatesEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
