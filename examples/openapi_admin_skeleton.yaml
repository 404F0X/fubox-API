  /admin/enterprise/identity-connections/saml/validate-acs-plan:
    post:
      tags: [Auth]
      summary: Plan bounded SAML ACS signature and assertion validation
      operationId: postEnterpriseSamlValidateAcsPlan
      description: Secret-safe SAML ACS validation seam. The request may contain only bounded presence booleans, SHA-256/fingerprint markers, metadata summaries, and fixture-safe assertion summaries. It must not contain or echo raw SAMLResponse, raw assertions, metadata XML, certificate bodies, private keys, tokens, Authorization headers, client secrets, raw NameID/email, or raw attribute values. The response returns XML signature validation, assertion audience/NameID/group mapping, and session/user_identity binding plans without parsing XML, performing network requests, or creating a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                saml_response_present:
                  type: boolean
                saml_response_sha256:
                  type: string
                  description: Non-secret fingerprint only; raw SAMLResponse is rejected.
                assertion_present:
                  type: boolean
                assertion_sha256:
                  type: string
                  description: Non-secret assertion fingerprint only; raw assertion XML is rejected.
                idp_certificate_sha256:
                  type: string
                  description: Non-secret certificate fingerprint only; certificate body is rejected.
                metadata_summary:
                  type: object
                  additionalProperties: true
                fixture_assertion_summary:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: SAML ACS validation plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseSamlValidateAcsPlan'
        '400':
          description: Raw SAML/assertion/certificate/secret material was submitted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/enterprise/identity-connections/saml/xml-signature-parser-executor:
    post:
      tags: [Auth]
      summary: Execute bounded SAML XML signature parser readback
      operationId: postEnterpriseSamlXmlSignatureParserExecutor
      description: Typed SAML XML signature parser executor boundary. It accepts only fixture-safe issuer/entity/certificate fingerprint presence or hash metadata, assertion subject hash, audience metadata, assertion time bounds, signature algorithm, and signature_verified metadata. It does not accept raw SAMLResponse, assertion XML, raw XML, raw claims, certificate bodies, private keys, or Authorization headers; it performs no network requests and does not parse real XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterpriseSamlXmlSignatureParserExecutorRequest'
      responses:
        '200':
          description: SAML XML signature parser executor readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseSamlXmlSignatureParserExecutorEnvelope'
        '400':
          description: Raw SAML/XML/assertion/certificate/secret material was refused without echoing values.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
