    OpeningBalanceImportRequest:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - wallet_id
        - currency
        - opening_amount
        - external_source
        - external_reference_id
        - effective_at
        - reason
        - actor_id
        - actor_type
        - idempotency_key
      properties:
        tenant_id:
          type: string
          format: uuid
        project_id:
          type: [string, 'null']
          format: uuid
        wallet_id:
          type: string
          format: uuid
        currency:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{2,31}$'
        opening_amount:
          type: string
          pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
          description: Positive fixed-decimal string. Float values are not accepted.
        external_source:
          type: string
          minLength: 1
          maxLength: 128
          description: Bounded source marker such as new_api, one_api, csv_import, or operator_migration; raw export payloads are forbidden.
        external_reference_id:
          type: string
          minLength: 1
          maxLength: 256
          description: Bounded external row/user/balance id. This is not a raw import payload.
        effective_at:
          type: string
          description: Timestamp accepted by Postgres timestamptz parsing.
        reason:
          type: string
          minLength: 1
          maxLength: 256
          description: Bounded operator reason. Secret-like material is rejected or redacted and must not be echoed as raw import payload.
        actor_id:
          type: string
          format: uuid
        actor_type:
          type: string
          enum: [admin_user, operator, migration_job]
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 256
          description: Required write idempotency key. Raw idempotency material is never echoed.
