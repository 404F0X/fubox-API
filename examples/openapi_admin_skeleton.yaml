  /admin/request-logs/export.csv:
    get:
      tags: [RequestLogs]
      summary: Export request logs CSV
      operationId: exportRequestLogsCsv
      description: Exports bounded, secret-safe request-log summary fields as text/csv for the current filters. The CSV schema is fixed to the columns listed in x-ai-gateway-csv-schema and intentionally excludes prompt text, raw request/response payloads, raw route snapshots, provider key material, API key secrets, virtual key secrets, Authorization/Cookie headers, and raw upstream/provider payloads. The server performs a best-effort secret-safe audit log with action request_logs.export_csv, action_result, row_count, and export_audit_readback; it never records CSV content, raw filters/query strings, provider responses, Authorization, provider keys, or API key secrets.
      x-ai-gateway-csv-schema:
        schema_version: admin_request_logs_export_csv.v1
        content_type: text/csv
        audit_action: request_logs.export_csv
        primary_acceptance_surface: false
        export_audit_readback:
          schema: admin_request_logs_export_audit_readback.v1
          audit_action: request_logs.export_csv
          audit_readback_path: GET /admin/audit-logs?action=request_logs.export_csv
          audit_id_ref_present: false
          audit_id_ref_reason: csv_endpoint_returns_text_csv_best_effort_audit_id_available_via_audit_logs_readback
          resource_ref_present: false
          filtered_row_count_field: filtered_row_count
          redaction_policy:
            schema: metadata_only_export_audit.v1
            csv_content_logged: false
            raw_filters_logged: false
            raw_payload_logged: false
            provider_response_logged: false
            authorization_logged: false
            provider_key_logged: false
            api_key_secret_logged: false
            policy: metadata_only_safe_summary_columns
          safe_next_action: Read GET /admin/audit-logs?action=request_logs.export_csv and compare filtered_row_count plus allowed_columns; use request detail or trace summary for row-level troubleshooting.
        header_required: true
        columns:
          - request_id
          - created_at
          - completed_at
          - status
          - http_status
          - requested_model
          - canonical_model_id
          - channel_id
          - virtual_key_id
          - api_key_profile_id
          - trace_id
          - client_request_id
          - stream
          - latency_ms
          - ttft_ms
          - input_tokens
          - output_tokens
          - final_cost
          - currency
          - error_owner
          - error_code
          - redaction_status
        allowed_columns:
          - request_id
          - created_at
          - completed_at
          - status
          - http_status
          - requested_model
          - canonical_model_id
          - channel_id
          - virtual_key_id
          - api_key_profile_id
          - trace_id
          - client_request_id
          - stream
          - latency_ms
          - ttft_ms
          - input_tokens
          - output_tokens
          - final_cost
          - currency
          - error_owner
          - error_code
          - redaction_status
        forbidden_columns:
          - prompt
          - messages
          - raw_request_payload
          - raw_response_payload
          - raw_provider_payload
          - provider_response
          - raw_route_decision_snapshot
          - raw_route_snapshot
          - raw_payload
          - provider_key
          - provider_key_id
          - provider_secret
          - api_key_secret
          - virtual_key_secret
          - authorization
          - cookie
        secret_safe: true
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: model
          in: query
          required: false
          schema:
            type: string
        - name: created_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: virtual_key_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: api_key_profile_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: canonical_model_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: channel_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: resolved_channel_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: stream
          in: query
          required: false
          schema:
            oneOf:
              - type: boolean
              - type: string
                enum: ['true', 'false']
        - name: error_code
          in: query
          required: false
          schema:
            type: string
        - name: error_type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Secret-safe request log CSV. Payloads, raw route snapshots, Authorization/Cookie headers, provider keys, virtual key secrets, raw filters, and CSV content audit echoes are omitted.
          content:
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
