          type: boolean
          description: Presence-only marker for the scanner secret reference. The secret/ref value is not returned.
        webhook_ref_present:
          type: boolean
          description: Presence-only marker for webhook configuration. The webhook/ref value is not returned.
        sync_direction:
          type: string
          enum: [external_to_control_plane_metadata_only, control_plane_to_external_disabled]
