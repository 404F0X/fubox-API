        - denied_reasons
      properties:
        source:
          type: string
          enum: [url, xml]
        accepted:
          type: boolean
        metadata_url_origin:
          type:
            - string
            - 'null'
          description: HTTPS scheme and authority only; path, query, and fragment are not returned.
          example: https://idp.example.com
        metadata_url_https:
          type: boolean
        entity_descriptor_present:
          type: boolean
        idp_sso_descriptor_present:
          type: boolean
        single_sign_on_service_count:
