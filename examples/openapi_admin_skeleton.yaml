    PaymentProviderBoundedExecutionPlan:
      type: object
      additionalProperties: true
      required:
        - schema
        - mode
        - attempted
        - action_result
        - writes
        - disabled_writes
        - secret_safe
        - raw_webhook_body_echoed
        - raw_provider_payload_echoed
        - raw_idempotency_key_echoed
        - authorization_echoed
        - provider_secret_echoed
        - db_url_echoed
      properties:
        schema:
          type: string
          const: payment_provider_bounded_execution_plan.v1
        mode:
          type: string
          const: verified_simulated_min_executor
        attempted:
          type: boolean
        action_result:
          type: string
          enum: [not_executed, written, replayed]
        reason:
          type: string
        next_step:
          type: string
        provider:
          type: string
        event_type:
          $ref: '#/components/schemas/PaymentProviderEventType'
        payment_event_id:
          type: string
          format: uuid
        payment_capture:
          type: object
          additionalProperties: true
        payment_refund:
          type: object
          additionalProperties: true
        ledger_executor:
          type: object
          additionalProperties: true
          description: Secret-safe readback for capture credit-grant ledger refs or existing-ref-only reversal ledger refs. It never indicates direct wallet snapshot mutation.
        credit_executor:
          type: object
          additionalProperties: true
          description: Capture-side verified-simulated credit grant executor readback. status=written/read_back means a tenant-scoped matched capture wrote or read credit_grants plus a confirmed credit_grant ledger entry; blocked means missing or unsafe preconditions.
        credit_reversal_executor:
          type: object
          additionalProperties: true
          description: Refund/chargeback-side source credit grant reversal readback. status=written/read_back/blocked, includes source_credit_grant_id, reversal_ledger_entry_id, and remaining_disabled_reason when blocked. It never mutates wallet snapshots directly and only handles exact matched tenant capture/order/wallet/currency/amount/source credit grant refs.
        chargeback_policy:
          type: object
          additionalProperties: true
          description: Secret-safe refund/chargeback policy readback showing matched-capture requirements, source_credit_grant_id, reversal_ledger_entry_id, status, and blocked_reason.
        wallet_accounting:
          type: object
          additionalProperties: true
          description: Capture-side wallet accounting readback. direct_wallet_snapshot_mutation is always false; accounting is represented by credit_grants and ledger_entries readback.
        reconciliation:
          type: object
          additionalProperties: true
        production_reconciliation:
          type: object
          additionalProperties: true
          description: Secret-safe local production reconciliation candidate readback for capture/refund/chargeback. Returns matched, mismatch, or refused from provider event, capture/refund, source ledger, reversal ledger, credit grant, and local reconciliation marker refs without exposing raw provider payloads or secrets. When present, source_of_truth_policy follows PaymentProviderSourceOfTruthPolicy and tells UI whether local_db_verified, provider_api_required, provider_webhook_verified, or refused is currently selected.
        refs:
          type: object
          additionalProperties: true
        writes:
          type: object
          additionalProperties:
            type: string
        disabled_writes:
          type: array
          items:
            type: string
          description: Writes intentionally disabled by this bounded executor when preconditions are missing. Capture may write tenant-scoped credit_grants plus confirmed credit_grant ledger entries only for verified_simulated matched payment intent/order/capture refs; refund/chargeback may write reversal ledger refs and void the source payment_provider_capture credit grant only for exact matched capture/order/wallet/currency/amount/source grant refs.
        secret_safe:
          type: boolean
          const: true
        raw_webhook_body_echoed:
          type: boolean
          const: false
        raw_provider_payload_echoed:
          type: boolean
          const: false
        raw_idempotency_key_echoed:
          type: boolean
          const: false
        authorization_echoed:
          type: boolean
          const: false
        provider_secret_echoed:
          type: boolean
          const: false
        db_url_echoed:
          type: boolean
          const: false
    PaymentProviderWebhookEventResponse:
