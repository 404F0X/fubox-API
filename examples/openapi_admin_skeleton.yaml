openapi: 3.1.0
info:
  title: AI Gateway Admin API
  version: 0.1.0
  description: Draft OpenAPI contract for the implemented control-plane admin surface.
servers:
  - url: http://localhost:8081
    description: Local control-plane service
security:
  - AdminBearerAuth: []
  - AdminSessionHeader: []
  - AdminSessionCookie: []
x-control-plane-rbac-capability-summary:
  backend_only: false
  secret_safe: true
  auth_me_response_includes_capabilities: true
  source: apps/control-plane/src/rbac.rs
  fixture: tests/fixtures/control-plane/rbac_matrix_contract.json
  role_mapping:
    SuperAdmin: owner
    TenantAdmin: admin
    Ops: ops
    Billing: billing
    Developer: developer
    Viewer: viewer
  permissions:
    provider_manage:
      allowed_roles: [owner, admin, ops]
    provider_key_manage:
      required_permission: key_manage
      control_plane_allowed_roles: [owner, admin, ops]
      allowed_roles: [owner, admin, ops]
    billing_read:
      allowed_roles: [owner, admin, billing, viewer]
    billing_adjust:
      allowed_roles: [owner, billing]
    audit_read:
      allowed_roles: [owner, admin, ops, viewer]
    request_log_metadata:
      allowed_roles: [owner, admin, ops, developer, viewer]
  sensitive_read_policy:
    viewer_denied_credential_sensitive_reads: true
    auth_me_exposes_permission_names: false
    exposed_summary_fields: [roles, personas, capabilities, denied_capabilities, secret_safe]
x-provider-key-production-rotation-contract:
  runtime_rotate_endpoint_implemented: true
  status_until_production_evidence_lands: production_ready_blocked
  path: POST /admin/provider-keys/{id}/rotate
  required_permission: key_manage
  audit_action: provider_key.rotate
  secret_safe_response_required: true
  server_side_sealing_required: true
  caller_encrypted_secret_rejected: true
  encrypted_at_rest_algorithm: aes-256-gcm
  response_omits: [secret, api_key, encrypted_secret, secret_fingerprint, current_window_state, Authorization, raw_endpoint, raw_payload]
  response_requires: [lifecycle_state, credential_generation, last_probe_summary, rotation_needed, safe_next_action, omitted_secret_policy]
  kms_or_master_key_custody_policy_required: true
  required_env: [AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64, AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_ID]
  bounded_substitute: create-new-key / verify-traffic / disable-old-key
  substitute_audit_actions: [provider_key.create, provider_key.update, provider_key.rotate]
  remaining_for_production_closure:
    - KMS/master-key custody evidence
    - production live traffic/readback on new key
    - old key disable/readback and rollback evidence
    - production-ready closure from fixture or dry-run evidence only
x-federated-auth-contract:
  source: apps/control-plane/src/auth.rs
  fixture: tests/fixtures/control-plane/oidc_saml_auth_contract.json
  default_deny: true
  secret_safe: true
  output_must_not_echo:
    - provider authorization code
    - id token value
    - access token value
    - refresh token value
    - SAMLResponse value
    - assertion value
    - claim values
    - metadata XML body
    - Authorization header
  direct_client_claims_allowed: false
  role_group_mapping:
    input_source: server-verified OIDC ID token/userinfo or server-verified SAML assertion only
    oidc_claims: [roles, realm_access.roles, groups]
    saml_claims: [Role, memberOf, groups]
    mapped_roles: [owner, admin, ops, billing, developer, viewer]
    unknown_values: ignored
    no_mapped_roles: denied
  trust_checks:
    issuer_allowlist_required: true
    audience_allowlist_required: true
    email_domain_allowlist_required: true
  enterprise_identity_connection_readback:
    path: GET /admin/enterprise/identity-connections
    schema: enterprise_identity_connections_readback.v1
    required_permission: key_manage
    provider_types: [oidc, saml]
    provider_fields: [provider_type, status, config_needed, metadata_url_present, mapped_roles, mapped_groups, next_step]
    allowed_statuses: [disabled, config-needed, validation-pending]
    callback_exchange_boundary_status: rejected_until_real_validation
    production_sso_verification_implemented: false
    raw_material_returned: false
  enterprise_accounts_readback:
    path: GET /admin/enterprise/accounts
    schema: admin_enterprise_accounts_readback.v1
    required_permission: key_manage
    source: tenants/users/projects/wallets/subscriptions/request_logs
    compact_admin_dashboard_schema: admin_enterprise_account_compact_dashboard.v1
    compact_admin_dashboard_fields: [identity_readiness, sales_activity_next_action, provisioning_invite_handoff, crm_sync_status, local_readiness_summary]
    mock_identity_executor_readback_only: true
    crm_connected: false
    external_sales_system_connected: false
    raw_material_returned: false
    provider_payload_returned: false
    network_requests_executed: false
  enterprise_account_provisioning:
    plan_path: POST /admin/enterprise/accounts/provisioning-plan
    apply_path: POST /admin/enterprise/accounts/provisioning-apply
    schema: admin_enterprise_account_provisioning_plan.v1
    admin_session_required: true
    source: tenants/projects/users/project_members/audit_logs
    apply_local_records_only: true
    email_sent: false
    idempotency_marker: audit_logs.metadata.idempotency_fingerprint
    raw_email_returned: false
    raw_idempotency_key_returned: false
  oidc:
    callback_exchange_plan_returned_after_valid_state: true
    token_exchange_implemented: false
    jwks_id_token_validation_implemented: false
    server_side_state_nonce_persistence_implemented: true
    session_creation_implemented: false
    callback_exchange_plan:
      status: plan_only_refusal
      network_request_attempted: false
      authorization_code_exchange:
        method: POST
        token_endpoint_source_env: AI_GATEWAY_OIDC_TOKEN_ENDPOINT
        token_endpoint_https_required: true
        pkce_required: true
        pkce_code_verifier_source: server_side_state_record
        client_auth_configured_server_side_only: true
      jwks_id_token_validation:
        jwks_uri_https_required: true
        required_checks:
          - kid_present_and_matches_jwks_key
          - alg_allowlist_enforced
          - signature_valid
          - issuer_matches_configured_provider
          - audience_contains_client_id
          - exp_not_expired
          - nonce_matches_consumed_server_state
      role_mapping_boundary: server_verified_oidc_id_token_or_userinfo_only
      user_identity_lookup: user_identities(provider, subject, tenant_id)
    remaining_gaps:
      - authorization_code_exchange
      - id_token_jwks_signature_validation
      - user_identity_binding_lookup
      - session_creation_after_verified_claims
  saml:
    validate_acs_plan:
      path: POST /admin/enterprise/identity-connections/saml/validate-acs-plan
      schema: enterprise_saml_validate_acs_plan.v1
      raw_saml_response_accepted: false
      raw_assertion_accepted: false
      certificate_body_returned: false
      session_created: false
    xml_signature_parser_executor:
      path: POST /admin/enterprise/identity-connections/saml/xml-signature-parser-executor
      schema: saml_xml_signature_parser_executor.v1
      executor_boundary: typed_saml_xml_signature_parser_executor
      network_enabled: false
      raw_xml_accepted: false
      accepted_input_fields:
        - issuer_present
        - issuer_hash
        - entity_id_present
        - entity_id_hash
        - certificate_fingerprint_present
        - certificate_fingerprint
        - assertion_subject_hash
        - audience_present
        - audience_hash
        - not_before_unix
        - not_on_or_after_unix
        - signature_algorithm
        - signature_verified
      blocked_reasons:
        - missing_issuer
        - missing_entity_id
        - missing_certificate_fingerprint
        - missing_audience
        - missing_assertion_subject_hash
        - unsupported_signature_alg
        - expired_assertion
        - signature_not_verified
      raw_material_returned: false
    metadata_summary_only: true
    metadata_url_requires_https: true
    metadata_url_query_allowed: false
    metadata_xml_external_entities_allowed: false
    network_fetch_implemented: false
    xml_signature_validation_implemented: false
    session_creation_implemented: false
    remaining_gaps:
      - saml_xml_signature_validation
      - saml_assertion_decryption_if_needed
      - saml_response_binding_validation
      - user_identity_binding_lookup
      - session_creation_after_verified_assertion
tags:
  - name: Health
  - name: Auth
  - name: Providers
  - name: Channels
  - name: ProviderKeys
  - name: ApiKeyProfiles
  - name: VirtualKeys
  - name: Models
  - name: ModelAssociations
  - name: PromptEvalShadow
  - name: RequestLogs
  - name: AuditLogs
  - name: Alerts
  - name: Settings
  - name: Users
  - name: Billing
  - name: Ledger
  - name: UserPortal
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Control-plane liveness
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Control-plane readiness
      operationId: getReadiness
      security: []
      responses:
        '200':
          description: Database connectivity is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Database connectivity is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /admin/distribution/readiness:
    get:
      tags: [Health]
      summary: Public API distribution readiness readback
      operationId: getAdminDistributionReadiness
      description: Admin-session scoped, secret-safe readback for voucher-backed public API distribution readiness. It returns provider/model/profile checks plus voucher batch status, user redeem readiness, virtual key issuance readiness, quota/pricing guardrails, and a safe next action. It does not perform release evidence collection and never returns raw voucher codes, voucher code hashes, API key secrets or hashes, Authorization headers, provider keys, raw provider payloads, or raw request payloads.
      responses:
        '200':
          description: Secret-safe distribution readiness readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDistributionReadinessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/setup/readback:
    get:
      tags: [Health]
      summary: Admin setup wizard readback
      operationId: getAdminSetupReadback
      description: Admin-session scoped first-run setup readback for local seed/admin/mock-provider/test-key/Gateway readiness. It returns first_run_readiness with admin, mock provider, mock channel, mock model, test key, and Gateway chat/responses/embeddings readiness plus blocked reasons and safe next action. It does not perform release validation and never returns raw admin passwords, API key secrets or hashes, provider secrets or hashes, authorization headers, raw provider payloads, or raw request payloads.
      responses:
        '200':
          description: Secret-safe setup wizard readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSetupReadbackEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user/developer-quickstart-readback:
    get:
      tags: [UserPortal]
      summary: User developer quickstart readback
      operationId: getUserDeveloperQuickstartReadback
      security:
        - UserSessionCookie: []
      description: User-session scoped aggregate DTO for developer console quickstart cards. It returns endpoint URLs, available model summary, current key status, recent request ids, mock chat/responses/embeddings readiness, billing balance summary, and safe next actions. It never returns raw API key secret/hash, Authorization, provider keys, provider key ids, prompts/messages, embedding input, raw request/response payloads, or upstream provider payloads. Real production provider smoke, real email delivery, and release evidence remain [!].
      responses:
        '200':
          description: Secret-safe quickstart readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDeveloperQuickstartReadbackEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user/developer-distribution-packet-readback:
    get:
      tags: [UserPortal]
      summary: Developer distribution packet readback
      operationId: getUserDeveloperDistributionPacketReadback
      security:
        - UserSessionCookie: []
      description: User-session scoped developer/operator distribution packet readback. It returns endpoint readiness, profile-filtered model availability, quota/rate/budget guardrail presence, voucher/key handoff route references, and one safe next action. It does not perform release validation and never returns raw API keys, voucher codes, provider keys, Authorization headers, tokens, raw request/response payloads, or upstream provider payloads.
      responses:
        '200':
          description: Secret-safe developer distribution packet readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDeveloperDistributionPacketReadbackEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user/security-activity-summary:
    get:
      tags: [UserPortal]
      summary: User security activity summary
      operationId: getUserSecurityActivitySummary
      security:
        - UserSessionCookie: []
      description: User-session scoped activity readback for login/session, password reset and email verification request readiness, API key create/disable audit counts, and balance/ledger activity. It returns only safe counts, bounded samples, and next actions; it never returns password hashes, session tokens or token hashes, API key secrets or secret hashes, Authorization, provider keys, raw ledger metadata, request bodies, response bodies, or raw payloads. Password reset and email verification are reported as productization placeholders until mail delivery and bounded audit markers are wired.
      responses:
        '200':
          description: Secret-safe security activity readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSecurityActivitySummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user/team-summary:
    get:
      tags: [UserPortal]
      summary: Current user team/project membership compact readback
      operationId: getUserTeamSummary
      security:
        - UserSessionCookie: []
      description: User-session and current-project scoped membership summary for the frontend rebuild. It returns user id, role/status, membership source, project key/profile access presence, recent request count/cost presence, bounded team member ids/roles/status, and a safe next action. It never returns raw email, session tokens, API key secrets or hashes, Authorization, provider keys, raw request/response payloads, raw metadata, or upstream provider payloads.
      responses:
        '200':
          description: Secret-safe user team membership summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTeamSummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user/billing-history-readback:
    get:
      tags: [UserPortal]
      summary: User billing and usage history compact readback
      operationId: getUserBillingHistoryReadback
      security:
        - UserSessionCookie: []
      description: User-session and project-scoped compact billing readback for the frontend rebuild. It returns current balance, recent ledger entries, request usage/cost rollup, voucher/order/subscription ref presence, omitted fields, and a safe next action. It never returns raw API keys, Authorization headers, provider keys, raw request/response/provider payloads, raw ledger metadata, raw invoice metadata, voucher code hashes, or raw idempotency material.
      responses:
        '200':
          description: Secret-safe billing history readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBillingHistoryReadbackEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Readback dependency unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/auth/login:
    post:
      tags: [Auth]
      summary: Create an admin session
      operationId: loginAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session created. The token is returned once and also set as an HttpOnly cookie.
          headers:
            Set-Cookie:
              description: HttpOnly admin session cookie scoped to /.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Login failure rate limit reached. The distributed Redis backend is enabled only when AI_GATEWAY_ADMIN_LOGIN_RATE_LIMIT_STORE is redis/distributed_redis; Redis backend failures fail closed with the same secret-safe error shape.
          headers:
            Retry-After:
              description: Seconds before the caller can retry this tenant + normalized login fingerprint.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-ai-gateway-login-rate-limit:
        fixture: tests/fixtures/control-plane/admin_auth_smoke.json
        key: tenant_id + normalized_email_fingerprint
        default_store: memory
        redis_store:
          env: AI_GATEWAY_ADMIN_LOGIN_RATE_LIMIT_STORE
          enabled_values: [redis, distributed_redis]
          redis_addr_source: config.redis.addr
          redis_db_source: config.redis.db
          atomic_record_failure: redis EVAL + SET EX
          unavailable_policy: fail_closed
          unavailable_error_code: login_rate_limited
          raw_username_stored: false
  /admin/auth/oidc/authorize-url:
    get:
      tags: [Auth]
      summary: Build an OIDC authorization URL
      operationId: getOidcAuthorizeUrl
      security: []
      responses:
        '200':
          description: Authorization URL draft. State and nonce are persisted server-side for callback validation, but callback exchange is not implemented in this slice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcAuthorizeEnvelope'
        '503':
          description: OIDC login is disabled or not configured.
  /admin/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: Validate OIDC callback state and reject until exchange is implemented
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Provider authorization code. Not exchanged in this slice and never echoed in errors.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Browser-returned state. Validated against in-memory server-side state and never echoed in errors.
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Provider error marker. Not trusted for login and never echoed in errors.
      responses:
        '400':
          description: Callback distinguishes missing, expired, invalid, and valid server-side state. Even with valid state it is rejected with a secret-safe plan-only exchange/JWKS/session boundary contract because authorization-code exchange and ID token/JWKS validation are not implemented. Caller-supplied roles, groups, ID/access tokens, Authorization headers, SAMLResponse values, assertions, raw code, state, client secrets, PKCE verifiers, or raw claims are not accepted for login and are never echoed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: OIDC login is disabled or not configured.
  /admin/auth/me:
    get:
      tags: [Auth]
      summary: Get the current admin user and session
      operationId: getAdminMe
      responses:
        '200':
          description: Current admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/enterprise/identity-connections:
    get:
      tags: [Auth]
      summary: Read enterprise OIDC/SAML connection skeleton
      operationId: getEnterpriseIdentityConnections
      description: Secret-safe runtime readback for enterprise identity connection configuration. This endpoint does not connect to an IdP, does not accept raw tokens or assertions, and does not create sessions. Callback/exchange remains rejected or config-needed until real server-side token/assertion validation is implemented.
      responses:
        '200':
          description: Enterprise identity connection readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseIdentityConnectionsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/enterprise/identity-connections/validation-plan:
    get:
      tags: [Auth]
      summary: Read enterprise OIDC/SAML validation dry-run plan
      operationId: getEnterpriseIdentityValidationPlan
      description: Secret-safe validation/config seam for enterprise identity providers. It reports OIDC issuer/client_id/JWKS metadata presence, SAML metadata/signature/cert presence, role/group mapping readiness, and the disabled callback/ACS boundary. It accepts no raw token/assertion input, performs no network requests, creates no session, and never returns client secrets, cert bodies, private keys, Authorization headers, raw claims, tokens, assertions, or metadata XML.
      responses:
        '200':
          description: Enterprise identity validation plan readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseIdentityValidationPlanEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/enterprise/identity-connections/oidc/validate-code-plan:
    post:
      tags: [Auth]
      summary: Plan bounded OIDC code exchange and JWKS validation
      operationId: postEnterpriseOidcValidateCodePlan
      description: Secret-safe bounded seam for OIDC authorization-code exchange and JWKS ID token validation. It accepts only code presence/hash metadata, state/nonce/PKCE presence flags, redirect URI presence, and fixture-safe claim summaries. It performs no network token exchange, accepts no raw ID/access/refresh token or raw authorization code, creates no session, and never returns client secrets, Authorization headers, raw claims, tokens, private keys, cert bodies, or raw claim values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterpriseOidcValidateCodePlanRequest'
      responses:
        '200':
          description: Bounded OIDC exchange/JWKS/session binding plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseOidcValidateCodePlan'
        '400':
          description: Raw token/code/claim/secret material was refused without echoing values.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/enterprise/identity-connections/oidc/execute-validated-login:
    post:
      tags: [Auth]
      summary: Execute mockable OIDC validated login binding
      operationId: postEnterpriseOidcExecuteValidatedLogin
      description: Mockable runtime executor seam for OIDC after server-side simulated JWKS validation. It accepts only verified claim summaries, validation booleans, safe subject hashes, and local user_identity binding inputs. It rejects raw authorization codes, ID/access/refresh tokens, raw claims, client secrets, Authorization headers, JWKS/JWK material, private keys, certificate bodies, and SAML assertions. Apply mode may only bind an existing local user_identity; it never creates a real session or returns cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterpriseOidcExecuteValidatedLoginRequest'
      responses:
        '200':
          description: OIDC validated-login binding readback with session creation disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseOidcExecuteValidatedLoginEnvelope'
        '400':
          description: Raw code/token/claim/secret material or failed JWKS validation was refused.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/enterprise/identity-connections/oidc/jwks-validator-executor:
    post:
      tags: [Auth]
      summary: Execute bounded OIDC JWKS validator readback
      operationId: postEnterpriseOidcJwksValidatorExecutor
      description: Mockable OIDC/JWKS validator executor seam. It accepts only fixture-safe JWT header and claims summaries, kid/alg/aud/iss/exp/nonce presence or hash markers, JWKS key fingerprint presence, and signature_verified booleans. It performs no IdP/JWKS network requests, creates no external session, and rejects raw tokens, raw claims, JWKS/JWK bodies, client_secret, Authorization, private keys, and certificate bodies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterpriseOidcExecuteValidatedLoginRequest'
      responses:
        '200':
          description: Bounded OIDC/JWKS validator result with binding/session handoff readiness.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseOidcJwksValidatorExecutorEnvelope'
        '400':
          description: Raw token/claim/JWKS/secret material was refused without echoing values.
