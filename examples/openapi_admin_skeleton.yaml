          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderLocalExecutorEnvelope'
        '400':
          description: Credential/config gate refused or request validation failed; no executor write on refused credential/config states.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderLocalExecutorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /billing/payment-provider/webhooks/{provider}:
    post:
      tags: [Billing]
      summary: Receive a bounded payment provider webhook
      operationId: receivePaymentProviderWebhook
      description: Bounded real-provider webhook seam. The endpoint verifies signature header presence and HMAC status before any DB write. Only verified simulated/sandbox signatures write a payment_events row and return a readback. Verified capture/refund/chargeback events also return a bounded execution plan that may write payment_captures/payment_refunds/payment_reconciliations when required refs match. Capture may write a tenant-scoped credit_grants row and confirmed credit_grant ledger entry only for verified_simulated matched payment intent/order/capture refs; direct wallet snapshot mutation remains disabled. Refund/chargeback may write a tenant-scoped reversal ledger ref and void the source payment_provider_capture credit grant only when capture/order/wallet/currency/amount/source credit grant refs match exactly. signature_missing, config_needed, and refused responses do not write. Raw webhook body, Authorization, provider secret, webhook signing secret, full idempotency key, provider payload, and DB URL are never returned.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_.-]{1,64}$'
        - name: x-fubox-payment-signature
          in: header
          required: false
          schema:
            type: string
          description: HMAC-SHA256 hex signature over the raw request body, optionally prefixed with sha256=. Header value is never echoed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentProviderWebhookEventRequest'
      responses:
        '202':
          description: Signature verified; payment_events write/readback completed and bounded execution_plan returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderWebhookEventEnvelope'
        '400':
          description: signature_missing or config_needed; no DB write.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderWebhookEventEnvelope'
        '401':
          description: refused signature; no DB write.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderWebhookEventEnvelope'
