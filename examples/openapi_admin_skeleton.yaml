          type: string
          enum: [draft, active, retired]
        created_at:
          type: string
    PriceVersionCreateRequest:
      type: object
      additionalProperties: false
      required:
        - price_book_id
        - version
        - pricing_rules
      properties:
        price_book_id:
          type: string
          format: uuid
        canonical_model_id:
          type: [string, 'null']
          format: uuid
        version:
          type: string
          minLength: 1
        pricing_rules:
          type: object
          additionalProperties: false
          required:
            - currency
          properties:
            currency:
              type: string
              pattern: '^[A-Z][A-Z0-9_]{2,31}$'
              description: Must match the price book currency.
            scale:
              type: integer
              minimum: 0
              maximum: 18
              default: 8
            input_token_rate_per_1m:
              oneOf:
                - type: string
                  pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
                - type: integer
                  minimum: 0
            output_token_rate_per_1m:
              oneOf:
                - type: string
                  pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
                - type: integer
                  minimum: 0
            cache_token_rate_per_1m:
              oneOf:
                - type: string
                  pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
                - type: integer
                  minimum: 0
            reasoning_token_rate_per_1m:
              oneOf:
                - type: string
                  pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
                - type: integer
                  minimum: 0
            fixed_request_cost:
              oneOf:
                - type: string
                  pattern: '^[+]?[0-9]+(\.[0-9]+)?$'
                - type: integer
                  minimum: 0
          description: At least one rate or fixed_request_cost field is required. Float money values and payload/secret/raw key fields are rejected.
        effective_at:
          type: [string, 'null']
          description: Optional timestamp accepted by Postgres timestamptz parsing; omitted values default to now().
        retired_at:
          type: [string, 'null']
          description: Optional retirement timestamp accepted by Postgres timestamptz parsing; must be after effective_at when provided.
        status:
          type: string
          enum: [draft, active, retired]
          default: draft
