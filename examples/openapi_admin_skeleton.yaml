      tags: [Ledger]
      summary: List ledger entries
      operationId: listLedgerEntries
      description: Read-only list of ledger_entries rows. usage_snapshot, policy_snapshot, and metadata are returned through the control-plane safe JSON sanitizer; payload bodies and secret material are not exposed.
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: request_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: wallet_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ledger entry list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntriesEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/ledger/adjustments/dry-run:
    post:
      tags: [Ledger]
      summary: Dry-run ledger adjustment or refund plan
      operationId: dryRunLedgerAdjustment
      description: BillingAdjust endpoint for bounded adjustment/refund validation. mode=dry_run returns a plan only. mode=execute revalidates and locks the bounded ledger rows, writes the confirmed ledger entry, and writes the success audit in the same database transaction; idempotent replays return the prior bounded ledger entry without a new ledger or audit write. Applied and idempotent execute responses include a secret-safe ledger_executor_summary_contract and ledger_executor_summary with executor, outcome, commit/rollback, statement count, row count, row-count mismatch, and omitted operation-key/error-detail markers. mode=execute_contract runs validation and returns the stable refusal contract plus the same safe summary contract. No request logs or upstream provider calls are made by any mode, and raw dedupe material, request metadata, credentials, Authorization/Cookie headers, payload/body, and operation keys are omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerAdjustmentDryRunRequest'
      responses:
        '200':
          description: Secret-safe adjustment/refund plan, or idempotent execute replay.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LedgerAdjustmentDryRunEnvelope'
                  - $ref: '#/components/schemas/LedgerAdjustmentExecuteEnvelope'
        '201':
          description: Execute applied a confirmed ledger adjustment/refund and success audit in one database transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerAdjustmentExecuteEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Execute contract requested; validation succeeded but the caller requested the explicit future-writer refusal contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerAdjustmentExecuteContractEnvelope'
components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: admin-session-token
      description: Admin session token returned once by POST /admin/auth/login.
    AdminSessionHeader:
      type: apiKey
      in: header
      name: x-admin-session
      description: Admin session token header.
    AdminSessionCookie:
      type: apiKey
      in: cookie
      name: ai_gateway_admin_session
      description: HttpOnly admin session cookie.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TraceIdPath:
      name: trace_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ProjectIdQuery:
      name: project_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 500
        default: 50
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing, invalid, or expired admin session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated admin session lacks the required permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServerError:
      description: Internal service or configuration error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    JsonValue:
      description: Arbitrary JSON value.
      oneOf:
        - type: 'null'
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            $ref: '#/components/schemas/JsonValue'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonValue'
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              $ref: '#/components/schemas/JsonValue'
    HealthResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
          example: control-plane
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      additionalProperties: false
      required: [service, status, database]
      properties:
        service:
          type: string
          example: control-plane
        status:
          type: string
          enum: [ready, not_ready]
        database:
          type: string
          enum: [connected, unavailable]
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
          writeOnly: true
