          type: object
          additionalProperties: false
          description: Bounded typed executor request for future server-side JWT parse and JWKS fetch plus fixture-safe cryptographic parser metadata. It accepts allowlisted metadata only and returns fetch_request_plan, parser_input_summary, and crypto_result_readback with network_enabled=false/network_call_performed=false by default. It must not contain raw id_token, JWKS/JWK body, raw claims, client_secret, Authorization, private keys, or cert bodies.
