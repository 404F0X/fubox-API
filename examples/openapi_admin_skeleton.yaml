        network_fetch_implemented:
          type: boolean
          const: false
        xml_signature_validation_implemented:
          type: boolean
          const: false
        xml_body_returned:
          type: boolean
          const: false
        secret_safe:
          type: boolean
          const: true
        denied_reasons:
          type: array
          items:
            type: string
            enum:
              - metadata_url_invalid
              - metadata_xml_invalid
              - metadata_xml_external_entity_rejected
              - metadata_xml_entity_descriptor_missing
