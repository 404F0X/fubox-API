      description: Secret-safe OIDC/SAML role and group mapping decision. It summarizes trust checks and mapped internal roles without returning tokens, caller-supplied claim values, raw claims, assertions, metadata XML, or Authorization headers.
      required:
        - protocol
        - accepted
        - mapped_roles
        - denied_reasons
        - trust_checks
        - ignored_unmapped_role_values
        - ignored_unmapped_group_values
