    post:
      tags: [VirtualKeys]
      summary: Handoff bounded external scanner finding summary
      operationId: handoffVirtualKeyExternalScannerFindings
      description: >
        Accepts only bounded external scanner summary metadata: provider, finding_count,
        key prefix/hash presence booleans, repo/ref hash, severity, detected_at,
        signature_validated, and optional virtual_key_id for local marker write. It
        rejects raw findings, raw tokens, raw virtual key material, raw key/hash values,
        Authorization headers, scanner secrets, webhook bodies, and request bodies. This
        seam does not connect to a scanner, does not run a repo scan, and leaves real
        scanner/vault/webhook signature verification marked [!].
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VirtualKeyExternalScannerHandoffRequest'
      responses:
        '200':
          description: Secret-safe handoff result. Writes virtual_keys.metadata.leak_detection only when virtual_key_id is present and found; otherwise returns a planned marker handoff.
