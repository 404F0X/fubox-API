            issuer:
              type: string
              description: Alias for issuer_url. Secret-safe HTTPS issuer URL.
            issuer_url:
              type: string
              description: Secret-safe HTTPS issuer URL.
            jwks_uri:
              type: string
              description: Alias for jwks_uri_ref. Reference or URL pointer to the JWKS endpoint, not the JWKS body.
            jwks_uri_ref:
              type: string
              description: Reference or URL pointer to the JWKS endpoint, not the JWKS body.
            kid:
              type: string
            alg:
              type: string
              description: Requested JWT alg. RS256 and ES256 are allowlisted; unsupported values are reported as blocked, not echoed as secrets.
