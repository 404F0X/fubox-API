          example: <admin-session-token-once>
    OidcAuthorizeEnvelope:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/OidcAuthorizeResponse'
    OidcAuthorizeResponse:
      type: object
      additionalProperties: false
      required:
        - provider
        - authorization_url
        - state
        - nonce
        - scopes
        - response_type
        - state_ttl_seconds
        - server_state_persisted
        - callback_implemented
      properties:
        provider:
          type: string
          example: default
        authorization_url:
          type: string
          format: uri
          description: OIDC provider authorization endpoint with response_type=code, client_id, redirect_uri, scope, state, and nonce.
        state:
          type: string
          description: Client-side state value to persist until callback validation.
        nonce:
          type: string
          description: Client-side nonce value to persist until ID token validation.
        scopes:
          type: array
          items:
            type: string
          example: [openid, email, profile]
        response_type:
          type: string
          const: code
        state_ttl_seconds:
          type: integer
          example: 300
        server_state_persisted:
          type: boolean
          const: true
          description: State and nonce are persisted in process-local server memory for callback validation in this slice.
        callback_implemented:
          type: boolean
          const: false
          description: Session-creating callback exchange is pending; the callback route rejects safely in this slice.
    FederatedAuthMappingDecision:
      type: object
      additionalProperties: false
      description: Secret-safe OIDC/SAML role and group mapping decision. It summarizes trust checks and mapped internal roles without returning tokens, caller-supplied claim values, raw claims, assertions, metadata XML, or Authorization headers.
      required:
        - protocol
        - accepted
        - mapped_roles
        - denied_reasons
        - trust_checks
        - ignored_unmapped_role_values
        - ignored_unmapped_group_values
        - secret_safe
        - claim_values_returned
        - token_values_returned
        - authorization_header_returned
      properties:
        protocol:
          type: string
          enum: [oidc, saml]
        accepted:
          type: boolean
          description: True only after server-verified claims satisfy issuer, audience, email-domain, and role/group mapping checks.
        mapped_roles:
          type: array
          items:
            type: string
            enum: [owner, admin, ops, billing, developer, viewer]
        denied_reasons:
          type: array
          items:
            type: string
            enum:
              - mapping_config_invalid
              - client_submitted_claims_not_accepted
              - issuer_not_allowed
              - audience_not_allowed
              - email_domain_not_allowed
              - claim_value_invalid
              - no_mapped_roles
        trust_checks:
          $ref: '#/components/schemas/FederatedAuthTrustChecks'
        ignored_unmapped_role_values:
          type: integer
          minimum: 0
        ignored_unmapped_group_values:
          type: integer
          minimum: 0
        secret_safe:
          type: boolean
          const: true
        claim_values_returned:
          type: boolean
          const: false
        token_values_returned:
          type: boolean
          const: false
        authorization_header_returned:
          type: boolean
          const: false
    FederatedAuthTrustChecks:
      type: object
      additionalProperties: false
      required:
        - requires_server_verified_claims
        - source_server_verified
        - issuer_allowlist_configured
        - issuer_allowed
        - audience_allowlist_configured
        - audience_allowed
        - email_domain_allowlist_configured
        - email_domain_allowed
        - mapping_configured
        - default_deny
        - direct_client_claims_allowed
        - token_exchange_implemented
        - oidc_jwks_validation_implemented
        - saml_xml_signature_validation_implemented
        - session_creation_implemented
      properties:
        requires_server_verified_claims:
          type: boolean
          const: true
        source_server_verified:
          type: boolean
        issuer_allowlist_configured:
          type: boolean
        issuer_allowed:
          type: boolean
        audience_allowlist_configured:
          type: boolean
        audience_allowed:
          type: boolean
        email_domain_allowlist_configured:
          type: boolean
        email_domain_allowed:
          type: boolean
        mapping_configured:
          type: boolean
        default_deny:
          type: boolean
          const: true
        direct_client_claims_allowed:
          type: boolean
          const: false
        token_exchange_implemented:
          type: boolean
          const: false
        oidc_jwks_validation_implemented:
          type: boolean
          const: false
        saml_xml_signature_validation_implemented:
          type: boolean
          const: false
        session_creation_implemented:
          type: boolean
          const: false
    SamlMetadataSummary:
      type: object
      additionalProperties: false
      description: Secret-safe SAML metadata URL/XML configuration summary. URL summaries expose only the HTTPS origin; XML summaries expose only counts and booleans.
      required:
        - source
        - accepted
        - metadata_url_origin
        - metadata_url_https
        - entity_descriptor_present
        - idp_sso_descriptor_present
        - single_sign_on_service_count
        - x509_certificate_count
