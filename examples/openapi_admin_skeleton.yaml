            format: uuid
      responses:
        '200':
          description: Secret-safe credit grant read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreditGrantReadEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/credit-grants/{credit_grant_id}/expire:
    post:
      tags: [Ledger]
      summary: Expire admin credit grant
      operationId: expireAdminCreditGrant
      description: BillingAdjust endpoint for expiring an active credit grant in one transaction with success audit. It requires an idempotency key; same-key same-body requests replay the original lifecycle audit, while same-key different-body requests are refused. It does not directly mutate wallet balance snapshots.
      parameters:
        - name: credit_grant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreditGrantLifecycleRequest'
      responses:
        '200':
          description: Credit grant expired, replayed, or refused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreditGrantRuntimeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/credit-grants/{credit_grant_id}/revoke:
    post:
      tags: [Ledger]
      summary: Revoke admin credit grant
      operationId: revokeAdminCreditGrant
      description: BillingAdjust endpoint for revoking an active credit grant in one transaction with success audit. It requires an idempotency key; same-key same-body requests replay the original lifecycle audit, while same-key different-body requests are refused. It does not directly mutate wallet balance snapshots.
      parameters:
        - name: credit_grant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreditGrantLifecycleRequest'
      responses:
        '200':
          description: Credit grant revoked, replayed, or refused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreditGrantRuntimeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/ledger/adjustments/dry-run:
    post:
      tags: [Ledger]
      summary: Dry-run ledger adjustment or refund plan
      operationId: dryRunLedgerAdjustment
      description: BillingAdjust endpoint for bounded adjustment/refund validation. mode=dry_run returns a plan only. mode=execute revalidates and locks the bounded ledger rows, writes the confirmed ledger entry, and writes the success audit in the same database transaction; idempotent replays return the prior bounded ledger entry without a new ledger or audit write. Dry-run, execute_contract, applied, and idempotent responses include ledger_adjustment_execution_readback with mode/outcome, wallet/credit_grant/budget ref presence, idempotency fingerprint, blocked reasons, and safe_next_action. Applied and idempotent execute responses include a secret-safe ledger_executor_summary_contract and ledger_executor_summary with executor, outcome, commit/rollback, statement count, row count, row-count mismatch, and omitted operation-key/error-detail markers. mode=execute_contract runs validation and returns the stable refusal contract plus the same safe summary contract. No request logs or upstream provider calls are made by any mode, and raw SQL, wallet secrets, raw dedupe material, raw idempotency, request metadata, credentials, Authorization/Cookie headers, payload/body, provider keys, and operation keys are omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerAdjustmentDryRunRequest'
      responses:
        '200':
          description: Secret-safe adjustment/refund plan, or idempotent execute replay.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LedgerAdjustmentDryRunEnvelope'
                  - $ref: '#/components/schemas/LedgerAdjustmentExecuteEnvelope'
        '201':
          description: Execute applied a confirmed ledger adjustment/refund and success audit in one database transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerAdjustmentExecuteEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Execute contract requested; validation succeeded but the caller requested the explicit future-writer refusal contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerAdjustmentExecuteContractEnvelope'
  /billing/opening-balance-imports:
    post:
      tags: [Ledger]
      summary: Contract-only opening balance import
      operationId: createOpeningBalanceImport
      description: Admin/RBAC protected opening balance import boundary for New API / One API migration rows. This write endpoint requires billing_adjust permission and an idempotency key. Current Control Plane runtime is contract-only and returns 501 without ledger, wallet, audit, request-log, provider, or Gateway mutation. Future runtime must write an opening ledger entry or admin adjustment entry plus audit/readback; it must not directly mutate wallet snapshot balance. Raw import payloads, bearer/session material, DB URLs, provider keys, virtual keys, and raw idempotency material are forbidden from request echoes and responses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpeningBalanceImportRequest'
      responses:
        '201':
          description: Opening balance imported or idempotently replayed by a future runtime implementation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningBalanceImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Idempotency or external reference conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningBalanceImportEnvelope'
        '501':
          description: Contract-only refusal; runtime mutation is not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpeningBalanceImportContractOnlyEnvelope'
  /admin/importer/apply-runs:
    post:
      tags: [Importers]
      summary: Accept reviewed importer apply plan
      operationId: createImporterApplyRun
      description: Admin/RBAC protected apply-live API skeleton for reviewed importer.apply-plan.v1 artifacts. The Control Plane validates shape, review marker, preflight status, and no-provider-key-material guardrails, then returns an accepted importer_apply_runs/importer_apply_operation_journal transaction skeleton. This endpoint does not execute SQL apply, does not persist journal rows yet, and must not echo raw import payloads, provider key material, bearer/session material, DB URLs, or credential material.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImporterApplyLiveRequest'
      responses:
        '202':
          description: Reviewed apply plan accepted for future transaction/journal persistence; no SQL apply was executed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImporterApplyLiveAcceptedEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/importer/apply-runs/readback:
    get:
      tags: [Importers]
      summary: Read local importer apply-plan readback seam
      operationId: getImporterApplyPlanReadback
      description: Secret-safe local demo/operator handoff readback for reviewed importer apply-plan results. It returns plan_hash, idempotency_fingerprint, applied_row_counts, rollback_journal_ref_present, blocked_reasons, safe_next_action, and db_writes_performed=false by default. It does not connect to production PostgreSQL and must not return DB URLs, raw SQL, raw user keys, provider keys, Authorization material, or secrets. [!] Real production DB connection and operator execution window remain external gaps.
      responses:
        '200':
          description: Local importer apply-plan readback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImporterApplyPlanReadbackEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Importers]
      summary: Record local importer apply-plan readback
      operationId: recordImporterApplyPlanReadback
      description: Records or normalizes a secret-safe local demo/operator handoff readback payload for a reviewed apply-plan. The payload may include hashes/fingerprints, applied row-count summaries, rollback journal reference presence, blockers, and safe_next_action. db_writes_performed must be false; DB URLs, raw SQL, raw user keys, provider keys, Authorization material, and secrets are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImporterApplyPlanReadbackRecordRequest'
      responses:
        '202':
          description: Local readback accepted; no production DB apply was performed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImporterApplyPlanReadbackEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /billing/recharge-intents:
    post:
      tags: [Ledger]
      summary: Contract-only recharge intent boundary
      operationId: createRechargeIntent
      description: TODO-32I contract-only recharge/top-up boundary. Future runtime must create a recharge_intents row, perform secret-safe payment provider handoff, and only issue credit_grants or ledger entries after trusted payment confirmation. Current route is not runtime-wired and must return 501/contract-only if exposed. Raw provider payloads, payment secrets, bearer/session material, DB URLs, raw idempotency keys, provider keys, virtual keys, and raw request payloads must not be echoed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RechargeIntentCreateRequest'
      responses:
        '201':
          description: Future runtime recharge intent creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRuntimeEnvelope'
        '501':
          description: Contract-only refusal; recharge runtime is not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherContractOnlyEnvelope'
  /admin/voucher-campaigns:
    post:
      tags: [Ledger]
      summary: Contract-only voucher campaign boundary
      operationId: createVoucherCampaign
      description: TODO-32I contract-only voucher campaign boundary. Future runtime must store campaign scope, fixed-decimal amount, validity window, max redemptions, and audit metadata without exposing raw voucher codes or secrets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherCampaignCreateRequest'
      responses:
        '201':
          description: Future runtime voucher campaign creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRuntimeEnvelope'
        '501':
          description: Contract-only refusal; voucher campaign runtime is not implemented.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherContractOnlyEnvelope'
  /admin/voucher-issuances:
    get:
      tags: [Ledger]
      summary: Voucher issuance secret-safe list
      operationId: listVoucherIssuances
      description: BillingRead voucher issuance list. Returns only bounded voucher identifiers, redacted code locators, status, amount, wallet/project/campaign ids, redemption counters, and audit ids. Raw voucher codes, raw idempotency keys, code hashes, lookup prefixes, auth/session tokens, provider payloads, DB URLs, provider keys, and virtual keys are forbidden in responses.
      parameters:
        - in: query
          name: wallet_id
          schema:
            type: string
            format: uuid
        - in: query
          name: project_id
          schema:
            type: string
            format: uuid
        - in: query
          name: campaign_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [issued, redeemed, expired, revoked]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Secret-safe voucher issuance list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherIssuanceListEnvelope'
    post:
      tags: [Ledger]
      summary: Voucher issuance runtime
      operationId: issueVoucher
      description: BillingAdjust voucher issuance runtime. The control plane hashes voucher codes server-side, stores only code_hash/code_lookup_prefix/code_redacted, returns only bounded identifiers plus code_redacted, supports same-key idempotent replay and same-key conflict refusal, and writes success audit in the same transaction. Refusals return runtime no-write readback markers. Raw voucher codes, raw idempotency keys, auth/session tokens, provider payloads, DB URLs, provider keys, and virtual keys are forbidden in responses and artifacts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherIssueRequest'
      responses:
        '201':
          description: Runtime voucher issuance applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRuntimeEnvelope'
        '200':
          description: Runtime voucher issuance replay or refusal. Refusals include refusal_no_credit_or_ledger_write=true and no voucher issuance row write.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRuntimeEnvelope'
  /admin/voucher-issuances/{id}/revoke:
    post:
      tags: [Ledger]
      summary: Voucher issuance revoke runtime
      operationId: revokeVoucherIssuance
      description: BillingAdjust voucher revoke runtime. Only issued vouchers may transition to revoked. The handler writes a secret-safe audit log and returns no raw voucher code, raw idempotency key, code hash, or lookup prefix.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Voucher was revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRevokeRuntimeEnvelope'
  /admin/voucher-issuance-batches:
    post:
      tags: [Ledger]
      summary: Voucher issuance batch runtime
      operationId: issueVoucherBatch
      description: BillingAdjust batch voucher issuance runtime. The request accepts operator-supplied raw voucher codes as write-only inputs, hashes and redacts them server-side, applies each valid item through the single voucher issuance transaction path, refuses duplicate codes or idempotency keys inside the batch, and returns only bounded item status plus redacted code locators. Raw voucher codes and raw idempotency keys are forbidden in responses and artifacts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherIssueBatchRequest'
      responses:
        '200':
          description: Batch voucher issuance completed, possibly with item refusals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherBatchRuntimeEnvelope'
  /admin/voucher-issuance-batches/{batch_hash}:
    get:
      tags: [Ledger]
      summary: Voucher issuance batch query
      operationId: getVoucherIssuanceBatch
      description: BillingRead voucher batch query by server-generated batch_idempotency_key_hash. Returns only counts, bounded voucher summaries, audit ids, and revocable_count. Raw voucher codes, code hashes, lookup prefixes, raw idempotency keys, auth/session tokens, provider payloads, DB URLs, provider keys, and virtual keys are forbidden in responses.
      parameters:
        - in: path
          name: batch_hash
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
      responses:
        '200':
          description: Secret-safe batch query summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherBatchQueryEnvelope'
  /admin/voucher-issuance-batches/{batch_hash}/revoke:
    post:
      tags: [Ledger]
      summary: Voucher issuance batch revoke
      operationId: revokeVoucherIssuanceBatch
      description: BillingAdjust voucher batch revoke by server-generated batch_idempotency_key_hash. Revokes currently issued vouchers in the batch, writes normal voucher revoke audit rows, and returns operation_id, counts, revoked voucher ids, and audit ids. Raw voucher codes, code hashes, lookup prefixes, raw idempotency keys, auth/session tokens, provider payloads, DB URLs, provider keys, and virtual keys are forbidden in responses.
      parameters:
        - in: path
          name: batch_hash
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
      responses:
        '200':
          description: Secret-safe batch revoke summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherBatchRevokeEnvelope'
  /billing/vouchers/redeem:
    post:
      tags: [Ledger]
      summary: Voucher redeem runtime
      operationId: redeemVoucher
      description: BillingAdjust voucher redeem runtime. The control plane resolves voucher ownership server-side, records bounded redeem attempts, supports same-key idempotent replay and same-key conflict refusal, refuses invalid redeems without credit/ledger writes, and on success writes voucher_redemptions plus credit grant, ledger effect, and audit in one transaction. Raw voucher code, auth/session tokens, provider payloads, DB URLs, provider keys, virtual keys, and raw idempotency material are forbidden from output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherRedeemRequest'
      responses:
        '200':
          description: Runtime voucher redeem, replay, or refusal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeVoucherRuntimeEnvelope'
components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: admin-session-token
      description: Admin session token returned once by POST /admin/auth/login.
    AdminSessionHeader:
      type: apiKey
      in: header
      name: x-admin-session
      description: Admin session token header.
    AdminSessionCookie:
      type: apiKey
      in: cookie
      name: ai_gateway_admin_session
      description: HttpOnly admin session cookie.
    UserSessionCookie:
      type: apiKey
      in: cookie
      name: ai_gateway_user_session
      description: HttpOnly user portal session cookie.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TraceIdPath:
      name: trace_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WalletIdPath:
      name: wallet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdQuery:
      name: project_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 500
        default: 50
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing, invalid, or expired admin session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated admin session lacks the required permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServerError:
      description: Internal service or configuration error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    JsonValue:
      description: Arbitrary JSON value.
      oneOf:
        - type: 'null'
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            $ref: '#/components/schemas/JsonValue'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonValue'
    MembershipProjectAccessSummary:
      type: object
      additionalProperties: true
      required: [key_access_present, active_profile_count, profile_access_present, source, secret_returned]
      properties:
        active_key_count:
          type: integer
        key_count:
          type: integer
        user_active_key_count:
          type: integer
        user_key_count:
          type: integer
        key_access_present:
          type: boolean
        active_profile_count:
          type: integer
        profile_access_present:
          type: boolean
        source:
          type: string
        secret_returned:
          type: boolean
          enum: [false]
    MembershipRecentUsageSummary:
      type: object
      additionalProperties: true
      required: [window_days, request_count, cost_present, final_cost, source, payload_returned]
      properties:
        window_days:
          type: integer
        request_count:
          type: integer
        succeeded_count:
          type: integer
        failed_count:
          type: integer
        cost_present:
          type: boolean
        final_cost:
          type: string
        last_request_at:
          type: [string, 'null']
        source:
          type: string
        payload_returned:
          type: boolean
          enum: [false]
    AdminProjectMembersSummaryEnvelope:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AdminProjectMembersSummary'
    AdminProjectMembersSummary:
      type: object
      additionalProperties: true
      required: [schema, tenant_id, project_id, member_count, members, project_access, recent_usage, safe_next_action, raw_email_returned, secret_safe, omitted_fields]
      properties:
        schema:
          type: string
          enum: [admin_project_membership_compact_readback.v1]
        tenant_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        member_count:
          type: integer
        members:
          type: array
          items:
            $ref: '#/components/schemas/AdminProjectMemberCompactSummary'
        project_access:
          $ref: '#/components/schemas/MembershipProjectAccessSummary'
        recent_usage:
          $ref: '#/components/schemas/MembershipRecentUsageSummary'
        safe_next_action:
          type: string
        raw_email_returned:
          type: boolean
          enum: [false]
        secret_safe:
          type: boolean
          enum: [true]
        omitted_fields:
          type: array
          items:
            type: string
    AdminProjectMemberCompactSummary:
      type: object
      additionalProperties: true
      required: [user_id, role, status, membership_source, project_access, recent_usage, safe_next_action, secret_returned]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
        status:
          type: string
        membership_source:
          type: string
          enum: [project_members]
        project_access:
          $ref: '#/components/schemas/MembershipProjectAccessSummary'
        recent_usage:
          $ref: '#/components/schemas/MembershipRecentUsageSummary'
        safe_next_action:
          type: string
        secret_returned:
          type: boolean
          enum: [false]
    UserTeamSummaryEnvelope:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserTeamSummary'
    UserTeamSummary:
      type: object
      additionalProperties: true
      required: [schema, tenant_id, project_id, user_id, role, status, membership_source, project_access, recent_usage, team_members, safe_next_action, handoff, secret_safe]
      properties:
        schema:
          type: string
          enum: [user_team_membership_compact_readback.v1]
        tenant_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
        status:
          type: string
        membership_source:
          type: string
        project_access:
          $ref: '#/components/schemas/MembershipProjectAccessSummary'
        recent_usage:
          $ref: '#/components/schemas/MembershipRecentUsageSummary'
        team_members:
          type: array
          items:
            $ref: '#/components/schemas/AdminProjectMemberCompactSummary'
        safe_next_action:
          type: string
        handoff:
          type: object
          additionalProperties: true
        secret_safe:
          type: boolean
          enum: [true]
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        type:
          type: string
        details:
          $ref: '#/components/schemas/JsonValue'
    HealthResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
          example: control-plane
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      additionalProperties: false
      required: [service, status, database]
      properties:
