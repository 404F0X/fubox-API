          description: Secret-safe reconciliation candidate mapper for Stripe-like provider objects. It compares the local executor action, fixed-decimal amount, currency, expected local refs, reduced provider object summary, and reduced response header summary. It returns matched, mismatch, or blocked, recommends retry only from safe header summary signals, and never echoes raw provider payloads, raw headers, raw refs, Authorization, provider secrets, or idempotency keys.
