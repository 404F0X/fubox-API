      operationId: postEnterpriseSamlExecuteValidatedAcs
      description: Runtime seam for SAML ACS after server-side validation. It accepts only fixture-safe verified assertion summaries, validation booleans, a safe external subject hash, and optional local user_identity binding inputs. It does not accept raw SAMLResponse/XML/assertion material, does not call an IdP, and does not create a session.
