                  type: string
                claims_audience:
                  type: string
                claims_nonce_present:
                  type: boolean
                claims_nonce_matches_request:
                  type: boolean
                claims_exp_unix:
                  type: integer
                  format: int64
                claims_iat_unix:
                  type: integer
                  format: int64
                claims_subject_hash:
                  type: string
                  description: SHA-256/hash marker of sub; raw subject is rejected.
                signature_verified:
                  type: boolean
