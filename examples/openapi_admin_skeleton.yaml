openapi: 3.1.0
info:
  title: AI Gateway Admin API
  version: 0.1.0
  description: Draft OpenAPI contract for the implemented control-plane admin surface.
servers:
  - url: http://localhost:8081
    description: Local control-plane service
security:
  - AdminBearerAuth: []
  - AdminSessionHeader: []
  - AdminSessionCookie: []
x-control-plane-rbac-capability-summary:
  backend_only: false
  secret_safe: true
  auth_me_response_includes_capabilities: true
  source: apps/control-plane/src/rbac.rs
  fixture: tests/fixtures/control-plane/rbac_matrix_contract.json
  role_mapping:
    SuperAdmin: owner
    TenantAdmin: admin
    Ops: ops
    Billing: billing
    Developer: developer
    Viewer: viewer
  permissions:
    provider_manage:
      allowed_roles: [owner, admin, ops]
    provider_key_manage:
      required_permission: key_manage
      control_plane_allowed_roles: [owner, admin, ops]
      allowed_roles: [owner, admin, ops]
    billing_read:
      allowed_roles: [owner, admin, billing, viewer]
    billing_adjust:
      allowed_roles: [owner, billing]
    audit_read:
      allowed_roles: [owner, admin, ops, viewer]
    request_log_metadata:
      allowed_roles: [owner, admin, ops, developer, viewer]
  sensitive_read_policy:
    viewer_denied_credential_sensitive_reads: true
    auth_me_exposes_permission_names: false
    exposed_summary_fields: [roles, personas, capabilities, denied_capabilities, secret_safe]
x-federated-auth-contract:
  source: apps/control-plane/src/auth.rs
  fixture: tests/fixtures/control-plane/oidc_saml_auth_contract.json
  default_deny: true
  secret_safe: true
  output_must_not_echo:
    - provider authorization code
    - id token value
    - access token value
    - refresh token value
    - SAMLResponse value
    - assertion value
    - claim values
    - metadata XML body
    - Authorization header
  direct_client_claims_allowed: false
  role_group_mapping:
    input_source: server-verified OIDC ID token/userinfo or server-verified SAML assertion only
    oidc_claims: [roles, realm_access.roles, groups]
    saml_claims: [Role, memberOf, groups]
    mapped_roles: [owner, admin, ops, billing, developer, viewer]
    unknown_values: ignored
    no_mapped_roles: denied
  trust_checks:
    issuer_allowlist_required: true
    audience_allowlist_required: true
    email_domain_allowlist_required: true
  oidc:
    callback_exchange_plan_returned_after_valid_state: true
    token_exchange_implemented: false
    jwks_id_token_validation_implemented: false
    server_side_state_nonce_persistence_implemented: true
    session_creation_implemented: false
    callback_exchange_plan:
      status: plan_only_refusal
      network_request_attempted: false
      authorization_code_exchange:
        method: POST
        token_endpoint_source_env: AI_GATEWAY_OIDC_TOKEN_ENDPOINT
        token_endpoint_https_required: true
        pkce_required: true
        pkce_code_verifier_source: server_side_state_record
        client_auth_configured_server_side_only: true
      jwks_id_token_validation:
        jwks_uri_https_required: true
        required_checks:
          - kid_present_and_matches_jwks_key
          - alg_allowlist_enforced
          - signature_valid
          - issuer_matches_configured_provider
          - audience_contains_client_id
          - exp_not_expired
          - nonce_matches_consumed_server_state
      role_mapping_boundary: server_verified_oidc_id_token_or_userinfo_only
      user_identity_lookup: user_identities(provider, subject, tenant_id)
    remaining_gaps:
      - authorization_code_exchange
      - id_token_jwks_signature_validation
      - user_identity_binding_lookup
      - session_creation_after_verified_claims
  saml:
    metadata_summary_only: true
    metadata_url_requires_https: true
    metadata_url_query_allowed: false
    metadata_xml_external_entities_allowed: false
    network_fetch_implemented: false
    xml_signature_validation_implemented: false
    session_creation_implemented: false
    remaining_gaps:
      - saml_xml_signature_validation
      - saml_assertion_decryption_if_needed
      - saml_response_binding_validation
      - user_identity_binding_lookup
      - session_creation_after_verified_assertion
tags:
  - name: Health
  - name: Auth
  - name: Providers
  - name: Channels
  - name: ProviderKeys
  - name: ApiKeyProfiles
  - name: VirtualKeys
  - name: Models
  - name: ModelAssociations
  - name: PromptEvalShadow
  - name: RequestLogs
  - name: AuditLogs
  - name: Alerts
  - name: Ledger
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Control-plane liveness
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Control-plane readiness
      operationId: getReadiness
      security: []
      responses:
        '200':
          description: Database connectivity is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Database connectivity is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /admin/auth/login:
    post:
      tags: [Auth]
      summary: Create an admin session
      operationId: loginAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session created. The token is returned once and also set as an HttpOnly cookie.
          headers:
            Set-Cookie:
              description: HttpOnly admin session cookie scoped to /.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Login failure rate limit reached. The distributed Redis backend is enabled only when AI_GATEWAY_ADMIN_LOGIN_RATE_LIMIT_STORE is redis/distributed_redis; Redis backend failures fail closed with the same secret-safe error shape.
          headers:
            Retry-After:
              description: Seconds before the caller can retry this tenant + normalized login fingerprint.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-ai-gateway-login-rate-limit:
        fixture: tests/fixtures/control-plane/admin_auth_smoke.json
        key: tenant_id + normalized_email_fingerprint
        default_store: memory
        redis_store:
          env: AI_GATEWAY_ADMIN_LOGIN_RATE_LIMIT_STORE
          enabled_values: [redis, distributed_redis]
          redis_addr_source: config.redis.addr
          redis_db_source: config.redis.db
          atomic_record_failure: redis EVAL + SET EX
          unavailable_policy: fail_closed
          unavailable_error_code: login_rate_limited
          raw_username_stored: false
  /admin/auth/oidc/authorize-url:
    get:
      tags: [Auth]
      summary: Build an OIDC authorization URL
      operationId: getOidcAuthorizeUrl
      security: []
      responses:
        '200':
          description: Authorization URL draft. State and nonce are persisted server-side for callback validation, but callback exchange is not implemented in this slice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcAuthorizeEnvelope'
        '503':
          description: OIDC login is disabled or not configured.
  /admin/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: Validate OIDC callback state and reject until exchange is implemented
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: Provider authorization code. Not exchanged in this slice and never echoed in errors.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Browser-returned state. Validated against in-memory server-side state and never echoed in errors.
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Provider error marker. Not trusted for login and never echoed in errors.
      responses:
        '400':
          description: Callback distinguishes missing, expired, invalid, and valid server-side state. Even with valid state it is rejected with a secret-safe plan-only exchange/JWKS/session boundary contract because authorization-code exchange and ID token/JWKS validation are not implemented. Caller-supplied roles, groups, ID/access tokens, Authorization headers, SAMLResponse values, assertions, raw code, state, client secrets, PKCE verifiers, or raw claims are not accepted for login and are never echoed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: OIDC login is disabled or not configured.
  /admin/auth/me:
    get:
      tags: [Auth]
      summary: Get the current admin user and session
      operationId: getAdminMe
      responses:
        '200':
          description: Current admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current admin session
      operationId: logoutAdmin
      responses:
        '200':
          description: Session revoked and cookie cleared.
          headers:
            Set-Cookie:
              description: Expired admin session cookie scoped to /.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/providers:
    get:
      tags: [Providers]
      summary: List providers
      operationId: listProviders
      responses:
        '200':
          description: Provider list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Providers]
      summary: Create or upsert a provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderCreateRequest'
      responses:
        '201':
          description: Provider created or upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/providers/health-summary:
    get:
      tags: [Providers]
      summary: Summarize provider routing health
      operationId: getProviderHealthSummary
      description: Returns a best-effort provider/channel/provider-key/model health dashboard summary from configured status fields and a bounded request-log sample. Provider key credential material is never returned.
      parameters:
        - name: window_minutes
          in: query
          required: false
          description: Request-log time window used for success-rate calculations.
          schema:
            type: integer
            minimum: 1
            maximum: 1440
            default: 60
        - name: sample_limit
          in: query
          required: false
          description: Maximum request-log rows sampled inside the time window. Values above 500 are capped server-side.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
      responses:
        '200':
          description: Provider health summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/providers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Providers]
      summary: Get a provider
      operationId: getProvider
      responses:
        '200':
          description: Provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Providers]
      summary: Patch a provider
      operationId: patchProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderPatchRequest'
      responses:
        '200':
          description: Updated provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Providers]
      summary: Soft-delete a provider
      operationId: deleteProvider
      responses:
        '200':
          description: Soft-deleted provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/channels:
    get:
      tags: [Channels]
      summary: List channels
      operationId: listChannels
      responses:
        '200':
          description: Channel list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Channels]
      summary: Create or upsert a channel
      operationId: createChannel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCreateRequest'
      responses:
        '201':
          description: Channel created or upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/channels/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Channels]
      summary: Get a channel
      operationId: getChannel
      responses:
        '200':
          description: Channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Channels]
      summary: Patch a channel
      operationId: patchChannel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelPatchRequest'
      responses:
        '200':
          description: Updated channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Channels]
      summary: Soft-delete a channel
      operationId: deleteChannel
      responses:
        '200':
          description: Soft-deleted channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/channels/{id}/manual-test:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Channels]
      summary: Dry-run a manual channel test
      operationId: dryRunChannelManualTest
      description: Builds a non-billable manual test plan for one channel without calling the upstream provider or returning provider key material.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelManualTestRequest'
      responses:
        '200':
          description: Dry-run manual test plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelManualTestEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/provider-keys:
    get:
      tags: [ProviderKeys]
      summary: List provider keys
      operationId: listProviderKeys
      responses:
        '200':
          description: Provider key list. Secret material is never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeysEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [ProviderKeys]
      summary: Create a provider key
      operationId: createProviderKey
      description: Accepts exactly one plaintext secret input, either secret or api_key. The response omits secret, api_key, encrypted_secret, and secret_fingerprint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderKeyCreateRequest'
      responses:
        '201':
          description: Provider key created with secret material redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/provider-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [ProviderKeys]
      summary: Get a provider key
      operationId: getProviderKey
      responses:
        '200':
          description: Provider key. Secret material is never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ProviderKeys]
      summary: Patch provider key status or metadata
      operationId: patchProviderKey
      description: Secret rotation is intentionally not accepted by this endpoint. Admin patch may move a key only to enabled, manual_disabled, degraded, or recovery_probe; runtime-managed auth_failed, quota_exhausted, and cooldown statuses are written by Gateway or Worker only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderKeyPatchRequest'
      responses:
        '200':
          description: Updated provider key with secret material redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ProviderKeys]
      summary: Soft-delete a provider key
      operationId: deleteProviderKey
      responses:
        '200':
          description: Soft-deleted provider key with secret material redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/provider-keys/{id}/recovery:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [ProviderKeys]
      summary: Request provider key manual recovery
      operationId: requestProviderKeyRecovery
      description: Performs only a controlled local status transition. No upstream probe, request log, ledger write, secret read, fingerprint read, or current window state read is performed.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderKeyRecoveryRequest'
      responses:
        '200':
          description: Provider key recovery transition result with credential material omitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderKeyRecoveryEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/api-key-profiles:
    get:
      tags: [ApiKeyProfiles]
      summary: List API key profiles for a project
      operationId: listApiKeyProfiles
      parameters:
        - $ref: '#/components/parameters/ProjectIdQuery'
      responses:
        '200':
          description: API key profile list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyProfilesEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [ApiKeyProfiles]
      summary: Create an API key profile
      operationId: createApiKeyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyProfileCreateRequest'
      responses:
        '201':
          description: API key profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyProfileEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/api-key-profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [ApiKeyProfiles]
      summary: Get an API key profile
      operationId: getApiKeyProfile
      responses:
        '200':
          description: API key profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ApiKeyProfiles]
      summary: Patch an API key profile
      operationId: patchApiKeyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyProfilePatchRequest'
      responses:
        '200':
          description: Updated API key profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyProfileEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ApiKeyProfiles]
      summary: Soft-delete an API key profile
      operationId: deleteApiKeyProfile
      responses:
        '200':
          description: Soft-deleted API key profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyProfileEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/virtual-keys:
    get:
      tags: [VirtualKeys]
      summary: List virtual keys for a project
      operationId: listVirtualKeys
      parameters:
        - $ref: '#/components/parameters/ProjectIdQuery'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/VirtualKeyStatus'
      responses:
        '200':
          description: Virtual key list. Secrets and secret hashes are never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualKeysEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
