          type: boolean
          description: True only after server-verified claims satisfy issuer, audience, email-domain, and role/group mapping checks.
        mapped_roles:
          type: array
          items:
            type: string
            enum: [owner, admin, ops, billing, developer, viewer]
        denied_reasons:
          type: array
          items:
            type: string
            enum:
              - mapping_config_invalid
              - client_submitted_claims_not_accepted
              - issuer_not_allowed
              - audience_not_allowed
              - email_domain_not_allowed
              - claim_value_invalid
              - no_mapped_roles
        trust_checks:
          $ref: '#/components/schemas/FederatedAuthTrustChecks'
        ignored_unmapped_role_values:
          type: integer
          minimum: 0
        ignored_unmapped_group_values:
          type: integer
          minimum: 0
        secret_safe:
          type: boolean
          const: true
        claim_values_returned:
          type: boolean
          const: false
        token_values_returned:
          type: boolean
          const: false
        authorization_header_returned:
          type: boolean
          const: false
