server:
  listen: ":8080"
  public_base_url: "http://localhost:8080"
  max_request_body_bytes: 10485760
  graceful_shutdown_seconds: 30
  # Empty by default: Gateway uses the TCP peer IP and ignores forwarded headers.
  # Add only trusted load balancer/proxy source IPs or CIDRs to enable X-Forwarded-For/X-Real-IP.
  # Generate a documentation-only example with:
  #   pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/write_network_security_config_example.ps1
  trusted_proxy_allowlist: []

database:
  driver: "postgres"
  dsn: "postgres://ai_gateway:ai_gateway@postgres:5432/ai_gateway?sslmode=disable"

redis:
  addr: "redis:6379"
  db: 0

security:
  master_key_env: "AI_GATEWAY_MASTER_KEY"
  secret_masking: true
  default_payload_policy: "metadata_only"
  prompt_protection:
    mode: "enforce"
    default_rules: true
    limits:
      max_rules: 4
      max_rule_name_bytes: 64
      max_pattern_bytes: 64
      max_scope_bytes: 64
    custom_rules:
      - name: "mask_demo_internal_marker"
        action: "mask"
        scope: "metadata"
        pattern:
          type: "contains"
          value: "demo-internal-marker"
          case_sensitive: false

routing:
  default_max_attempts: 2
  retry_before_first_byte_only_for_stream: true
  default_timeout_seconds: 120
  stream_idle_timeout_seconds: 60

# Provider/channel records are stored in the control-plane database, not in this
# runtime config file. Secret-safe Gemini onboarding example:
#
# provider:
#   name: "google-gemini"
#   kind: "gemini"
#   status: "enabled"
# channel:
#   provider: "google-gemini"
#   name: "gemini-generate-content"
#   protocol_mode: "gemini_generate_content"
#   endpoint: "https://generativelanguage.googleapis.com"
#   model_mappings:
#     "gemini-2.5-flash": "gemini-2.5-flash"
# provider_key:
#   channel: "gemini-generate-content"
#   status: "enabled"
#   secret_source: "operator_entered"
#   secret_example: "${GEMINI_API_KEY}"
#   note: "Do not store real provider keys in config.example.yaml."

observability:
  metrics_enabled: true
  otlp_enabled: false
  log_payload_default: false
  raw_stream_sampling_rate: 0.001

billing:
  pre_authorize_enabled: true
  reserve_enabled: true
  default_currency: "CREDIT"
  settlement_async: true
