global:
  imageRegistry: ""
  imagePullSecrets: []
  commonLabels: {}
  podLabels: {}
  podAnnotations: {}
  commonEnv: {}
  automountServiceAccountToken: false
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  config:
    enabled: true
    name: runtime-config
    fileName: config.yaml
    mountPath: /app/config/config.yaml
    content: "server:\n  listen: \":8080\"\n  public_base_url: \"http://localhost:8080\"\n  max_request_body_bytes: 10485760\n  graceful_shutdown_seconds: 30\nsecurity:\n  master_key_env: \"AI_GATEWAY_MASTER_KEY\"\n  secret_masking: true\n  default_payload_policy: \"metadata_only\"\nrouting:\n  default_max_attempts: 2\n  retry_before_first_byte_only_for_stream: true\n  default_timeout_seconds: 120\n  stream_idle_timeout_seconds: 60\nobservability:\n  metrics_enabled: true\n  otlp_enabled: false\n  log_payload_default: false\n  raw_stream_sampling_rate: 0.001\nbilling:\n  pre_authorize_enabled: true\n  reserve_enabled: true\n  default_currency: \"CREDIT\"\n  settlement_async: true\n"

database:
  secretRef:
    name: fubox-postgresql
    optional: false

redis:
  secretRef:
    name: fubox-redis
    optional: false

application:
  secretRef:
    name: fubox-app-secrets
    optional: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fubox.local
      paths:
        - path: /
          pathType: Prefix
          service: admin-ui
        - path: /v1
          pathType: Prefix
          service: gateway
        - path: /admin
          pathType: Prefix
          service: control-plane
  tls: []

services:
  gateway:
    enabled: true
    replicas: 1
    image:
      repository: fubox/ai-gateway
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 8080
    service:
      type: ClusterIP
      port: 8080
      targetPort: http
    applicationSecretRef: true
    databaseSecretRef: true
    redisSecretRef: true
    configMapRef: true
    env:
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_LISTEN: 0.0.0.0:8080
      AI_GATEWAY_ALLOW_UNSAFE_PROVIDER_ENDPOINTS: "true"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    probes:
      liveness:
        enabled: true
        path: /healthz
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readiness:
        enabled: true
        path: /readyz
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3

  control-plane:
    enabled: true
    replicas: 1
    image:
      repository: fubox/ai-control-plane
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 8081
    service:
      type: ClusterIP
      port: 8081
      targetPort: http
    applicationSecretRef: true
    databaseSecretRef: true
    redisSecretRef: true
    configMapRef: true
    env:
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_CONTROL_LISTEN: 0.0.0.0:8081
      AI_GATEWAY_ALLOW_UNSAFE_PROVIDER_ENDPOINTS: "true"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    probes:
      liveness:
        enabled: true
        path: /healthz
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readiness:
        enabled: true
        path: /readyz
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3

  admin-ui:
    enabled: true
    replicas: 1
    image:
      repository: fubox/admin-ui
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 8080
    service:
      type: ClusterIP
      port: 8080
      targetPort: http
    applicationSecretRef: false
    databaseSecretRef: false
    redisSecretRef: false
    configMapRef: false
    env:
      ADMIN_UI_PORT: "8080"
      GATEWAY_UPSTREAM: 'http://{{ include "fubox.componentName" (dict "root" . "name" "gateway") }}:8080'
      CONTROL_PLANE_UPSTREAM: 'http://{{ include "fubox.componentName" (dict "root" . "name" "control-plane") }}:8081'
      MOCK_PROVIDER_UPSTREAM: 'http://{{ include "fubox.componentName" (dict "root" . "name" "mock-provider") }}:18080'
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    probes:
      liveness:
        enabled: true
        path: /
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readiness:
        enabled: true
        path: /
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3

  mock-provider:
    enabled: true
    replicas: 1
    image:
      repository: fubox/mock-provider
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 18080
    service:
      type: ClusterIP
      port: 18080
      targetPort: http
    applicationSecretRef: false
    databaseSecretRef: false
    redisSecretRef: false
    configMapRef: false
    env:
      MOCK_PROVIDER_PORT: "18080"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    probes:
      liveness:
        enabled: true
        path: /healthz
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readiness:
        enabled: true
        path: /healthz
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
