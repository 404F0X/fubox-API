{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- include "fubox.validateService" (dict "root" $root "name" $name "svc" $svc) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fubox.componentName" (dict "root" $root "name" $name) }}
  labels:
    {{- include "fubox.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
    {{- with $root.Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      {{- include "fubox.selectorLabels" (dict "root" $root "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fubox.selectorLabels" (dict "root" $root "name" $name) | nindent 8 }}
        {{- with $root.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $svc.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or $root.Values.global.podAnnotations $svc.podAnnotations }}
      annotations:
        {{- with $root.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $svc.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if hasKey $root.Values.global "automountServiceAccountToken" }}
      automountServiceAccountToken: {{ $root.Values.global.automountServiceAccountToken }}
      {{- end }}
      {{- $podSecurityContext := default $root.Values.global.podSecurityContext $svc.podSecurityContext }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "fubox.image" (dict "root" $root "image" $svc.image) | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $svc.image.pullPolicy }}
          {{- $securityContext := default $root.Values.global.securityContext $svc.securityContext }}
          {{- with $securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          {{- if or $root.Values.global.commonEnv $svc.env }}
          env:
            {{- range $key, $value := $root.Values.global.commonEnv }}
            - name: {{ $key }}
              value: {{ tpl (toString $value) $root | quote }}
            {{- end }}
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              value: {{ tpl (toString $value) $root | quote }}
            {{- end }}
          {{- end }}
          {{- if or $svc.extraEnvFrom (and $svc.applicationSecretRef $root.Values.application.secretRef.name) (and $svc.databaseSecretRef $root.Values.database.secretRef.name) (and $svc.redisSecretRef $root.Values.redis.secretRef.name) }}
          envFrom:
            {{- if and $svc.applicationSecretRef $root.Values.application.secretRef.name }}
            - secretRef:
                name: {{ $root.Values.application.secretRef.name | quote }}
                optional: {{ default false $root.Values.application.secretRef.optional }}
            {{- end }}
            {{- if and $svc.databaseSecretRef $root.Values.database.secretRef.name }}
            - secretRef:
                name: {{ $root.Values.database.secretRef.name | quote }}
                optional: {{ default false $root.Values.database.secretRef.optional }}
            {{- end }}
            {{- if and $svc.redisSecretRef $root.Values.redis.secretRef.name }}
            - secretRef:
                name: {{ $root.Values.redis.secretRef.name | quote }}
                optional: {{ default false $root.Values.redis.secretRef.optional }}
            {{- end }}
            {{- with $svc.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and $svc.configMapRef $root.Values.global.config.enabled }}
          volumeMounts:
            - name: runtime-config
              mountPath: {{ $root.Values.global.config.mountPath | quote }}
              subPath: {{ $root.Values.global.config.fileName | quote }}
              readOnly: true
          {{- end }}
          {{- with $svc.probes.liveness }}
          {{- if .enabled }}
          livenessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: http
            initialDelaySeconds: {{ default 10 .initialDelaySeconds }}
            periodSeconds: {{ default 10 .periodSeconds }}
            timeoutSeconds: {{ default 2 .timeoutSeconds }}
            failureThreshold: {{ default 3 .failureThreshold }}
          {{- end }}
          {{- end }}
          {{- with $svc.probes.readiness }}
          {{- if .enabled }}
          readinessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: http
            initialDelaySeconds: {{ default 5 .initialDelaySeconds }}
            periodSeconds: {{ default 10 .periodSeconds }}
            timeoutSeconds: {{ default 2 .timeoutSeconds }}
            failureThreshold: {{ default 3 .failureThreshold }}
          {{- end }}
          {{- end }}
      {{- if and $svc.configMapRef $root.Values.global.config.enabled }}
      volumes:
        - name: runtime-config
          configMap:
            name: {{ include "fubox.configMapName" $root | quote }}
            items:
              - key: {{ $root.Values.global.config.fileName | quote }}
                path: {{ $root.Values.global.config.fileName | quote }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fubox.componentName" (dict "root" $root "name" $name) }}
  labels:
    {{- include "fubox.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
    {{- with $root.Values.global.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ default "ClusterIP" $svc.service.type }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: {{ default "http" $svc.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "fubox.selectorLabels" (dict "root" $root "name" $name) | nindent 4 }}
{{- end }}
{{- end }}
