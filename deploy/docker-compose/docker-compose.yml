x-staging-security-env: &staging-security-env
  AI_GATEWAY_TRUSTED_PROXY_ALLOWLIST_STATUS: ${AI_GATEWAY_TRUSTED_PROXY_ALLOWLIST_STATUS:-config-needed}
  AI_GATEWAY_IP_ALLOWLIST_STATUS: ${AI_GATEWAY_IP_ALLOWLIST_STATUS:-config-needed}
  AI_GATEWAY_RATE_LIMIT_STATUS: ${AI_GATEWAY_RATE_LIMIT_STATUS:-config-needed}

x-staging-external-env: &staging-external-env
  AI_GATEWAY_CLICKHOUSE_CONFIG_STATUS: ${AI_GATEWAY_CLICKHOUSE_CONFIG_STATUS:-config-needed}
  AI_GATEWAY_PROVIDER_ADAPTER_STATUS: ${AI_GATEWAY_PROVIDER_ADAPTER_STATUS:-config-needed}
  AI_GATEWAY_PAYMENT_PROVIDER_STATUS: ${AI_GATEWAY_PAYMENT_PROVIDER_STATUS:-config-needed}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ai_gateway
      POSTGRES_PASSWORD: ai_gateway
      POSTGRES_DB: ai_gateway
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../db:/app/db:ro
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/0000_postgres_init.sh:ro

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"

  mock-provider:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/mock-provider.Dockerfile
    ports:
      - "127.0.0.1:${MOCK_PROVIDER_HOST_PORT:-18080}:18080"

  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile
      args:
        BIN: ai-gateway
    depends_on:
      - postgres
      - redis
      - mock-provider
    environment:
      <<:
        - *staging-security-env
        - *staging-external-env
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_MASTER_KEY: change-me-in-dev-only
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64: ${AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64:?AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64 must be set}
      AI_GATEWAY_LISTEN: 0.0.0.0:8080
      AI_GATEWAY_ALLOW_UNSAFE_PROVIDER_ENDPOINTS: "true"
      AI_GATEWAY_CORS_ALLOWED_ORIGINS: http://localhost:${ADMIN_UI_HOST_PORT:-5173},http://127.0.0.1:${ADMIN_UI_HOST_PORT:-5173}
    volumes:
      - ../../examples/config.example.yaml:/app/config/config.yaml:ro
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8080}:8080"

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile
      args:
        BIN: ai-control-plane
    depends_on:
      - postgres
      - redis
    environment:
      <<:
        - *staging-security-env
        - *staging-external-env
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_MASTER_KEY: change-me-in-dev-only
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64: ${AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64:?AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64 must be set}
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_ID: dev-seed-v1
      AI_GATEWAY_CONTROL_LISTEN: 0.0.0.0:8081
      AI_GATEWAY_CONTROL_CORS_ALLOWED_ORIGINS: http://localhost:${ADMIN_UI_HOST_PORT:-5173},http://127.0.0.1:${ADMIN_UI_HOST_PORT:-5173}
      AI_GATEWAY_ALLOW_UNSAFE_PROVIDER_ENDPOINTS: "true"
      AI_GATEWAY_ADMIN_COOKIE_SECURE: "false"
    volumes:
      - ../../examples/config.example.yaml:/app/config/config.yaml:ro
    ports:
      - "127.0.0.1:${CONTROL_PLANE_HOST_PORT:-8081}:8081"

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile
      args:
        BIN: ai-worker
    depends_on:
      - postgres
      - redis
    environment:
      <<:
        - *staging-security-env
        - *staging-external-env
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_MASTER_KEY: change-me-in-dev-only
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64: ${AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64:?AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64 must be set}
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_ID: dev-seed-v1
    volumes:
      - ../../examples/config.example.yaml:/app/config/config.yaml:ro

  worker-recovery-probe:
    profiles:
      - ops
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile
      args:
        BIN: ai-worker
    depends_on:
      - postgres
      - redis
      - mock-provider
    command:
      - recovery-probe
      - --execute
      - --limit
      - ${RECOVERY_PROBE_LIMIT:-50}
    environment:
      <<:
        - *staging-security-env
        - *staging-external-env
      AI_GATEWAY_CONFIG: /app/config/config.yaml
      AI_GATEWAY_MASTER_KEY: change-me-in-dev-only
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64: ${AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64:?AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_BASE64 must be set}
      AI_GATEWAY_PROVIDER_KEY_MASTER_KEY_ID: dev-seed-v1
      AI_GATEWAY_ALLOW_UNSAFE_PROVIDER_ENDPOINTS: "true"
    volumes:
      - ../../examples/config.example.yaml:/app/config/config.yaml:ro

  admin-ui:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/admin-ui.Dockerfile
    depends_on:
      - gateway
      - control-plane
      - mock-provider
    environment:
      GATEWAY_UPSTREAM: http://gateway:8080
      CONTROL_PLANE_UPSTREAM: http://control-plane:8081
      MOCK_PROVIDER_UPSTREAM: http://mock-provider:18080
    ports:
      - "127.0.0.1:${ADMIN_UI_HOST_PORT:-5173}:8080"

volumes:
  pg_data:
